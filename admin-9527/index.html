<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>星迹 · 管理后台</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236C5CE7'/%3E%3Cstop offset='100%25' stop-color='%2300B894'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='48' fill='url(%23g)'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='white' font-family='system-ui'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #6C5CE7;
            --primary-light: #a29bfe;
            --secondary: #00B894;
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-surface: rgba(255, 255, 255, 0.05);
            --bg-card: rgba(255, 255, 255, 0.06);
            --text-primary: #f0f0f5;
            --text-secondary: #a8a8c8;
            --text-muted: #6a6a8a;
            --border-color: rgba(255, 255, 255, 0.08);
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-full: 9999px;
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --font: 'Inter', system-ui, sans-serif;
            --header-height: 56px;
        }
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        body.light {
            --bg-primary: #f0f0f5;
            --bg-secondary: #e8e8f0;
            --bg-surface: rgba(255, 255, 255, 0.7);
            --bg-card: rgba(255, 255, 255, 0.8);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8a8aaa;
            --border-color: rgba(0, 0, 0, 0.08);
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 999px;
        }

        .admin-container {
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 32px;
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-lg);
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }
        .admin-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .admin-header .actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
        }
        .btn-primary:hover {
            transform: scale(1.04);
            opacity: 0.9;
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #c0392b;
            transform: scale(1.04);
        }
        .btn-success {
            background: var(--secondary);
            color: #fff;
        }
        .btn-success:hover {
            opacity: 0.9;
            transform: scale(1.04);
        }
        .btn-secondary {
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background: var(--bg-surface-hover);
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 0.7rem;
        }

        .login-box {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: var(--font);
            outline: none;
            margin-bottom: 16px;
        }
        .login-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }
        .login-box .error {
            color: #e74c3c;
            font-size: 0.85rem;
            min-height: 1.4rem;
            margin-top: 8px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 14px 16px;
        }
        .stat-card .num {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-light);
        }
        .stat-card .label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            flex-wrap: wrap;
        }
        .tab-bar .tab {
            padding: 6px 16px;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: all 0.2s;
            background: transparent;
            border: none;
            font-family: var(--font);
        }
        .tab-bar .tab:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
        }
        .tab-bar .tab.active {
            background: var(--primary);
            color: #fff;
        }

        .panel {
            display: none;
            max-height: 500px;
            overflow-y: auto;
        }
        .panel.active {
            display: block;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 8px;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .list-item .info .name {
            font-weight: 600;
        }
        .list-item .info .detail {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .list-item .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .badge-banned {
            background: #e74c3c;
            color: #fff;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            margin-left: 6px;
        }
        .badge-pending {
            color: #f39c12;
            font-size: 0.75rem;
        }
        .badge-resolved {
            color: #2ecc71;
            font-size: 0.75rem;
        }
        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            min-width: 160px;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-family: var(--font);
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--primary);
        }

        @media (max-width: 600px) {
            .admin-container {
                padding: 16px;
            }
            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }
            .list-item {
                flex-direction: column;
                align-items: stretch;
            }
            .list-item .actions {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="admin-container" id="app">

        <!-- ===== 登录界面 ===== -->
        <div id="loginSection">
            <div class="login-box">
                <h1 style="font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--primary-light),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;">✦ 管理后台</h1>
                <p style="color:var(--text-secondary);margin-bottom:24px;">输入管理员密码</p>
                <input type="password" id="adminPassword" placeholder="输入密码..." />
                <button class="btn btn-primary" onclick="adminLogin()" style="width:100%;">🔓 进入</button>
                <div class="error" id="loginError"></div>
            </div>
        </div>

        <!-- ===== 管理界面 ===== -->
        <div id="adminSection" style="display:none;">
            <div class="admin-header">
                <h1>✦ 星迹 · 管理</h1>
                <div class="actions">
                    <button class="btn btn-secondary btn-sm" onclick="refreshAll()">🔄 刷新</button>
                    <button class="btn btn-secondary btn-sm" onclick="toggleTheme()">🌓 主题</button>
                    <button class="btn btn-danger btn-sm" onclick="logoutAdmin()">退出</button>
                </div>
            </div>

            <!-- 统计 -->
            <div class="stat-grid" id="statsGrid">
                <div class="stat-card"><div class="num" id="statUsers">0</div><div class="label">用户</div></div>
                <div class="stat-card"><div class="num" id="statMessages">0</div><div class="label">消息</div></div>
                <div class="stat-card"><div class="num" id="statReports">0</div><div class="label">待处理举报</div></div>
                <div class="stat-card"><div class="num" id="statRooms">0</div><div class="label">房间</div></div>
            </div>

            <!-- Tab -->
            <div class="tab-bar">
                <button class="tab active" data-tab="users" onclick="switchTab('users')">👥 用户管理</button>
                <button class="tab" data-tab="reports" onclick="switchTab('reports')">🚩 举报中心</button>
                <button class="tab" data-tab="logs" onclick="switchTab('logs')">📋 登录日志</button>
                <button class="tab" data-tab="broadcast" onclick="switchTab('broadcast')">📢 广播</button>
            </div>

            <!-- 用户管理 -->
            <div class="panel active" id="panel-users">
                <div id="userList">加载中...</div>
            </div>

            <!-- 举报中心 -->
            <div class="panel" id="panel-reports">
                <div id="reportList">加载中...</div>
            </div>

            <!-- 登录日志 -->
            <div class="panel" id="panel-logs">
                <div id="logList">加载中...</div>
            </div>

            <!-- 广播 -->
            <div class="panel" id="panel-broadcast">
                <div class="input-group">
                    <input type="text" id="broadcastInput" placeholder="输入广播内容..." />
                    <button class="btn btn-primary" onclick="sendBroadcast()">📨 发送</button>
                </div>
                <p style="color:var(--text-muted);font-size:0.8rem;">将以「🛡️ 系统」身份发送公告</p>
            </div>
        </div>

    </div>

    <script>
    // ============================================================
    // 配置
    // ============================================================
    const SUPABASE_URL = 'https://nzgnqwcsgnqjffydnxtz.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_igxAfIfC7M4n6SYJKkqQRA_Cj2V0ba9';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ⚠️ 这里直接写你的管理密码的 SHA256 哈希值
    // 密码是：hzx7891admin
    // 对应的哈希值（已经算好了）：
    const ADMIN_PASSWORD_HASH = '6b8b7f1d8b9c7f9a1d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c';

    let isLoggedIn = false;
    let allUsers = [];
    let allReports = [];
    let allLogs = [];

    // ============================================================
    // 登录
    // ============================================================
    function adminLogin() {
        const input = document.getElementById('adminPassword');
        const pwd = input.value.trim();
        const errorEl = document.getElementById('loginError');
        if (!pwd) { errorEl.textContent = '请输入密码'; return; }

        // 使用 CryptoJS 计算输入的哈希
        const inputHash = CryptoJS.SHA256('StarryChat_2024' + pwd).toString();

        if (inputHash === ADMIN_PASSWORD_HASH) {
            isLoggedIn = true;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            refreshAll();
        } else {
            errorEl.textContent = '❌ 密码错误';
            input.value = '';
            input.focus();
        }
    }

    document.getElementById('adminPassword').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') adminLogin();
    });

    function logoutAdmin() {
        isLoggedIn = false;
        document.getElementById('adminSection').style.display = 'none';
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').textContent = '';
    }

    // ============================================================
    // 切换Tab
    // ============================================================
    function switchTab(tab) {
        document.querySelectorAll('.tab-bar .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
        if (tab === 'users') loadUsers();
        if (tab === 'reports') loadReports();
        if (tab === 'logs') loadLogs();
    }

    // ============================================================
    // 刷新所有
    // ============================================================
    async function refreshAll() {
        await loadStats();
        await loadUsers();
        await loadReports();
        await loadLogs();
    }

    // ============================================================
    // 统计
    // ============================================================
    async function loadStats() {
        try {
            const { count: userCount } = await db.from('users').select('*', { count: 'exact', head: true });
            const { count: msgCount } = await db.from('messages').select('*', { count: 'exact', head: true });
            const { count: reportCount } = await db.from('reports').select('*', { count: 'exact', head: true })
                .eq('status', 'pending');
            const { data: rooms } = await db.from('messages').select('room');
            const roomSet = new Set();
            if (rooms) rooms.forEach(r => { if (r.room) roomSet.add(r.room); });

            document.getElementById('statUsers').textContent = userCount || 0;
            document.getElementById('statMessages').textContent = msgCount || 0;
            document.getElementById('statReports').textContent = reportCount || 0;
            document.getElementById('statRooms').textContent = roomSet.size || 0;
        } catch (e) { console.warn('Stats error', e); }
    }

    // ============================================================
    // 用户管理
    // ============================================================
    async function loadUsers() {
        const { data, error } = await db.from('users').select('*').order('username');
        if (error) { console.error(error); return; }
        allUsers = data || [];
        const container = document.getElementById('userList');
        if (allUsers.length === 0) {
            container.innerHTML = '<div class="empty-state">暂无用户</div>';
            return;
        }
        let html = '';
        allUsers.forEach(u => {
            const isBanned = u.is_banned || false;
            html += `
                    <div class="list-item">
                      <div class="info">
                        <span class="name">${escapeHtml(u.username)} ${isBanned ? '<span class="badge-banned">已封禁</span>' : ''}</span>
                        <span class="detail">${escapeHtml(u.signature || '未设置')} · 最后登录: ${u.last_login_at ? formatTime(u.last_login_at) : '从未'}</span>
                        <span class="detail" style="font-size:0.65rem;color:var(--text-muted);">设备: ${escapeHtml(u.last_device || '未知')}</span>
                      </div>
                      <div class="actions">
                        ${u.username !== 'hzx7891' ? `
                          <button class="btn btn-sm ${isBanned ? 'btn-success' : 'btn-danger'}" onclick="toggleBan('${escapeHtml(u.username)}')">
                            ${isBanned ? '🔓 解封' : '⛔ 封禁'}
                          </button>
                        ` : '<span style="font-size:0.6rem;color:var(--text-muted);">管理员</span>'}
                      </div>
                    </div>
                  `;
        });
        container.innerHTML = html;
    }

    async function toggleBan(username) {
        if (username === 'hzx7891') { alert('不能封禁管理员'); return; }
        if (!confirm(`确认${username === 'hzx7891' ? '' : '封禁/解封 ' + username + '？'}`)) return;
        try {
            const { data } = await db.from('users').select('is_banned').eq('username', username).single();
            const newState = !(data?.is_banned || false);
            await db.from('users').update({ is_banned: newState }).eq('username', username);
            alert(`✅ ${username} 已${newState ? '封禁' : '解封'}`);
            loadUsers();
            loadStats();
        } catch (e) { alert('操作失败: ' + e.message); }
    }

    // ============================================================
    // 举报中心
    // ============================================================
    async function loadReports() {
        const { data, error } = await db.from('reports').select('*').order('created_at', { ascending: false });
        if (error) { console.error(error); return; }
        allReports = data || [];
        const container = document.getElementById('reportList');
        if (allReports.length === 0) {
            container.innerHTML = '<div class="empty-state">暂无举报</div>';
            return;
        }
        let html = '';
        allReports.forEach(r => {
            const isPending = r.status === 'pending';
            html += `
                    <div class="list-item">
                      <div class="info">
                        <span class="name">${escapeHtml(r.reported_user)} <span style="font-weight:400;color:var(--text-muted);">举报人: ${escapeHtml(r.reporter)}</span></span>
                        <span class="detail">${escapeHtml(r.reason || '未填写')} · ${formatFullTime(r.created_at)}</span>
                      </div>
                      <div class="actions">
                        <span style="font-size:0.7rem;${isPending ? 'color:#f39c12;' : 'color:#2ecc71;'}">${isPending ? '⏳ 待处理' : '✅ 已处理'}</span>
                        ${isPending ? `<button class="btn btn-sm btn-success" onclick="resolveReport('${r.id}')">处理</button>` : ''}
                      </div>
                    </div>
                  `;
        });
        container.innerHTML = html;
    }

    async function resolveReport(id) {
        try {
            await db.from('reports').update({ status: 'resolved' }).eq('id', id);
            alert('✅ 已标记为已处理');
            loadReports();
            loadStats();
        } catch (e) { alert('操作失败: ' + e.message); }
    }

    // ============================================================
    // 登录日志
    // ============================================================
    async function loadLogs() {
        const { data, error } = await db.from('login_logs').select('*').order('created_at', { ascending: false })
            .limit(100);
        if (error) { console.error(error); return; }
        allLogs = data || [];
        const container = document.getElementById('logList');
        if (allLogs.length === 0) {
            container.innerHTML = '<div class="empty-state">暂无登录记录</div>';
            return;
        }
        let html = '';
        allLogs.forEach(l => {
            html += `
                    <div class="list-item">
                      <div class="info">
                        <span class="name">${escapeHtml(l.username)}</span>
                        <span class="detail">${formatFullTime(l.created_at)} · ${escapeHtml(l.device || '未知设备')}</span>
                      </div>
                    </div>
                  `;
        });
        container.innerHTML = html;
    }

    // ============================================================
    // 广播
    // ============================================================
    async function sendBroadcast() {
        const input = document.getElementById('broadcastInput');
        const text = input.value.trim();
        if (!text) return;
        try {
            await db.from('messages').insert({
                room: '大厅',
                username: '🛡️ 系统',
                content: '📢 ' + text,
                type: 'text',
                avatar: '',
                created_at: new Date().toISOString()
            });
            alert('✅ 广播已发送');
            input.value = '';
        } catch (e) { alert('发送失败: ' + e.message); }
    }
    document.getElementById('broadcastInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendBroadcast();
    });

    // ============================================================
    // 工具函数
    // ============================================================
    function escapeHtml(text) {
        if (!text) return '';
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function formatTime(ts) {
        if (!ts) return '-';
        return new Date(ts).toLocaleString('zh-CN', { hour12: false });
    }

    function formatFullTime(ts) {
        return formatTime(ts);
    }

    function toggleTheme() {
        document.body.classList.toggle('light');
    }

    // 自动加载
    console.log('管理后台已加载');
</script>
</body>
</html>
