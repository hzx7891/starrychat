<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>星迹 StarryChat</title>
    <script>
        // SPA 路由重定向：将路径转为查询参数，跳转到 index.html
        (function() {
            var path = window.location.pathname.slice(1); // 去掉开头的 /
            var search = window.location.search;
            // 构建目标 URL
            var target = '/starrychat/?' + path + search;
            window.location.replace(target);
        })();
    </script>
</head>
<body>
    <p>正在跳转...</p>
    <a href="/starrychat/">点击这里</a>
</body>
</html>
