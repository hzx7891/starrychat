<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>星迹 StarryChat</title>
    <script>
        // 保存当前路径到 sessionStorage
        sessionStorage.setItem('redirect-path', window.location.pathname + window.location.search);
        // 重定向到根路径
        window.location.replace('/starrychat/');
    </script>
</head>
<body>
    <!-- 如果 JavaScript 被禁用，显示备用内容 -->
    <p>正在跳转...</p>
    <a href="/starrychat/">点击这里</a>
</body>
</html>
