<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>星迹 · 管理后台</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236C5CE7'/%3E%3Cstop offset='100%25' stop-color='%2300B894'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='48' fill='url(%23g)'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='white' font-family='system-ui'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js">
    </script>
    <style>
        /* ===== 完整样式 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6C5CE7; --primary-light: #a29bfe; --secondary: #00B894;
            --bg-primary: #0a0a1a; --bg-secondary: #12122a;
            --bg-surface: rgba(255,255,255,0.05); --bg-card: rgba(255,255,255,0.06);
            --text-primary: #f0f0f5; --text-secondary: #a8a8c8; --text-muted: #6a6a8a;
            --border-color: rgba(255,255,255,0.08);
            --radius-md: 12px; --radius-lg: 20px; --radius-full: 9999px;
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
            --font: 'Inter', system-ui, sans-serif;
            --header-height: 56px;
        }
        body { font-family: var(--font); background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; margin: 0; }
        body.light {
            --bg-primary: #f0f0f5; --bg-secondary: #e8e8f0;
            --bg-surface: rgba(255,255,255,0.7); --bg-card: rgba(255,255,255,0.8);
            --text-primary: #1a1a2e; --text-secondary: #4a4a6a; --text-muted: #8a8aaa;
            --border-color: rgba(0,0,0,0.08);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 999px; }

        /* 登录 */
        #loginOverlay {
            position: fixed; inset: 0; background: var(--bg-primary);
            display: flex; justify-content: center; align-items: center; z-index: 9999; padding: 20px;
            backdrop-filter: blur(12px);
        }
        #loginOverlay .login-box {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); padding: 40px 36px; max-width: 400px; width: 100%;
            text-align: center; box-shadow: var(--shadow-lg); animation: fadeIn 0.4s ease;
        }
        #loginOverlay .login-box h1 {
            font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        #loginOverlay .login-box p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 28px; }
        #loginOverlay .login-box input {
            width: 100%; padding: 14px 18px; border-radius: var(--radius-md);
            border: 1px solid var(--border-color); background: var(--bg-surface);
            color: var(--text-primary); font-size: 1rem; outline: none; margin-bottom: 16px;
            font-family: var(--font);
        }
        #loginOverlay .login-box input:focus {
            border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108,92,231,0.15);
        }
        #loginOverlay .login-box .btn-login {
            width: 100%; padding: 14px; border: none; border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s;
            font-family: var(--font);
        }
        #loginOverlay .login-box .btn-login:hover { transform: scale(1.02); opacity: 0.9; }
        #loginOverlay .login-box .error { color: #e74c3c; font-size: 0.85rem; margin-top: 12px; min-height: 1.4rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* 布局 */
        .app-container { display: flex; height: 100vh; width: 100%; }
        .sidebar {
            width: 200px; background: var(--bg-secondary); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 12px 0; flex-shrink: 0; height: 100vh;
            position: sticky; top: 0; overflow-y: auto;
        }
        .sidebar .brand {
            padding: 0 16px 20px; font-size: 1.1rem; font-weight: 700;
            color: var(--text-primary); display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid var(--border-color); margin-bottom: 8px;
        }
        .sidebar .brand span {
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .sidebar .nav-item {
            padding: 8px 16px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s;
            border-left: 3px solid transparent; font-size: 0.82rem;
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar .nav-item:hover { background: var(--bg-surface); color: var(--text-primary); }
        .sidebar .nav-item.active { background: var(--bg-surface); color: var(--text-primary); border-left-color: var(--primary); }
        .sidebar .user-badge {
            margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border-color);
            font-size: 0.7rem; color: var(--text-muted);
        }
        .sidebar .user-badge strong { color: var(--text-primary); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-primary); }
        .main .header {
            height: var(--header-height); padding: 0 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color); background: var(--bg-card);
            backdrop-filter: blur(12px); flex-shrink: 0; gap: 8px;
        }
        .main .header h2 { font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .main .header .actions { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
        .main .content { flex: 1; overflow-y: auto; padding: 16px; }
        .main .content .page { display: none; animation: fadeIn 0.25s ease; }
        .main .content .page.active { display: block; }

        /* 组件 */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 16px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px 14px; backdrop-filter: blur(8px); }
        .stat-card .num { font-size: 1.6rem; font-weight: 700; color: var(--primary-light); }
        .stat-card .label { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

        .btn-sm {
            padding: 3px 10px; border-radius: var(--radius-full); border: none;
            font-size: 0.65rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            background: var(--bg-surface); color: var(--text-primary); font-family: var(--font); white-space: nowrap;
        }
        .btn-sm.danger { background: #e74c3c; color: #fff; }
        .btn-sm.danger:hover { background: #c0392b; }
        .btn-sm.success { background: var(--secondary); color: #fff; }
        .btn-sm.success:hover { opacity: 0.9; }
        .btn-sm.primary { background: var(--primary); color: #fff; }
        .btn-sm.primary:hover { opacity: 0.9; }
        .btn-sm.warning { background: #f39c12; color: #fff; }
        .btn-sm.warning:hover { background: #d68910; }
        .btn-sm:hover { transform: scale(1.04); }

        .input-group { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
        .input-group input, .input-group select {
            flex: 1; min-width: 80px; padding: 6px 10px; border-radius: var(--radius-md);
            border: 1px solid var(--border-color); background: var(--bg-surface);
            color: var(--text-primary); font-family: var(--font); outline: none; font-size: 0.8rem;
        }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary); }

        .table-wrap { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow-x: auto; padding: 2px 0; margin-top: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { text-align: left; padding: 6px 10px; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border-color); white-space: nowrap; position: sticky; top: 0; background: var(--bg-card); z-index: 2; font-size: 0.7rem; }
        td { padding: 5px 10px; border-bottom: 1px solid var(--border-color); vertical-align: middle; max-width: 150px; word-break: break-word; font-size: 0.75rem; }
        tr:hover td { background: var(--bg-surface); }

        .checkbox-cell { width: 24px; text-align: center; }
        .checkbox-cell input[type="checkbox"] { accent-color: var(--primary); width: 14px; height: 14px; cursor: pointer; }

        .badge-banned { background: #e74c3c; color: #fff; font-size: 0.55rem; padding: 1px 6px; border-radius: var(--radius-full); }
        .badge-pending { color: #f39c12; font-size: 0.65rem; }
        .badge-resolved { color: #2ecc71; font-size: 0.65rem; }
        .badge-rejected { color: #e74c3c; font-size: 0.65rem; }
        .empty-state { text-align: center; padding: 30px 0; color: var(--text-muted); font-size: 0.8rem; }

        .batch-actions { display: flex; gap: 6px; padding: 4px 0; flex-wrap: wrap; align-items: center; }
        .batch-actions span { color: var(--text-muted); font-size: 0.7rem; }

        .log-box { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 8px 12px; max-height: 150px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.68rem; border: 1px solid var(--border-color); margin-top: 6px; color: var(--text-secondary); }
        .log-box .log-entry { padding: 2px 0; border-bottom: 1px solid var(--border-color); }
        .log-box .log-entry .time { color: var(--text-muted); margin-right: 8px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 999; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-card); backdrop-filter: blur(24px); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; max-width: 480px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; animation: fadeIn 0.3s ease; box-shadow: var(--shadow-lg); }
        .modal-content h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
        .modal-content .modal-body { flex: 1; overflow-y: auto; padding: 4px 0; }
        .modal-content .modal-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .modal-content .modal-actions .btn-sm { flex: 1; min-width: 60px; }

        .tab-bar { display: flex; gap: 2px; margin-bottom: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; flex-wrap: wrap; }
        .tab-bar .tab { padding: 4px 12px; border-radius: var(--radius-full); cursor: pointer; font-size: 0.7rem; color: var(--text-secondary); transition: all 0.2s; background: transparent; border: none; font-family: var(--font); }
        .tab-bar .tab:hover { background: var(--bg-surface); color: var(--text-primary); }
        .tab-bar .tab.active { background: var(--primary); color: #fff; }

        .color-picker-group { display: flex; gap: 12px; align-items: center; margin: 8px 0; flex-wrap: wrap; }
        .color-picker-group label { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
        .color-picker-group input[type="color"] { width: 32px; height: 32px; border: 2px solid var(--border-color); border-radius: 50%; cursor: pointer; background: none; padding: 0; }

        @media (max-width:720px) {
            .sidebar { width: 48px; padding: 8px 0; }
            .sidebar .brand span, .sidebar .nav-item span:not(.icon) { display: none; }
            .sidebar .nav-item { justify-content: center; padding: 8px; }
            .sidebar .user-badge { text-align: center; font-size: 0.5rem; padding: 6px 2px; }
            .stat-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
            .stat-card { padding: 8px 10px; }
            .stat-card .num { font-size: 1.2rem; }
            .main .content { padding: 8px; }
            .main .header { padding: 0 8px; height: 44px; }
            .main .header h2 { font-size: 0.8rem; }
            table { font-size: 0.65rem; }
            th, td { padding: 3px 6px; max-width: 80px; }
            .input-group input, .input-group select { font-size: 0.7rem; padding: 4px 8px; min-width: 60px; }
            .btn-sm { font-size: 0.55rem; padding: 2px 8px; }
        }
    </style>
</head>
<body>

    <!-- 登录 -->
    <div id="loginOverlay">
        <div class="login-box">
            <h1>✦ 星迹 · Dev</h1>
            <p>开发者控制台 · 密码验证</p>
            <input type="password" id="devPassword" placeholder="输入开发者密码" />
            <button class="btn-login" onclick="attemptLogin()">🔓 进入</button>
            <div class="error" id="loginError"></div>
        </div>
    </div>

    <!-- 主应用 -->
    <div class="app-container" id="appContainer" style="display:none;">
        <div class="sidebar" id="sidebar">
            <div class="brand">✦ <span>星迹·Dev</span></div>
            <div class="nav-item active" data-page="dashboard">📊 <span>仪表板</span></div>
            <div class="nav-item" data-page="users">👥 <span>用户</span></div>
            <div class="nav-item" data-page="messages">💬 <span>消息</span></div>
            <div class="nav-item" data-page="rooms">🏠 <span>房间</span></div>
            <div class="nav-item" data-page="reports">🚩 <span>举报</span></div>
            <div class="nav-item" data-page="appeals">📩 <span>申诉</span></div>
            <div class="nav-item" data-page="logs">📋 <span>日志</span></div>
            <div class="nav-item" data-page="settings">⚙️ <span>设置</span></div>
            <div class="user-badge" id="userBadge">👤 <strong>开发者</strong></div>
        </div>

        <div class="main">
            <div class="header">
                <h2 id="pageTitle">📊 仪表板</h2>
                <div class="actions">
                    <button class="btn-sm primary" onclick="refreshAll()">🔄</button>
                    <button class="btn-sm" onclick="toggleTheme()">🌓</button>
                    <button class="btn-sm danger" onclick="logoutDev()">退出</button>
                </div>
            </div>
            <div class="content" id="mainContent">

                <!-- 仪表板 -->
                <div class="page active" id="page-dashboard">
                    <div class="stat-grid" id="statsGrid">
                        <div class="stat-card"><div class="num" id="statUsers">0</div><div class="label">用户</div></div>
                        <div class="stat-card"><div class="num" id="statMessages">0</div><div class="label">消息</div></div>
                        <div class="stat-card"><div class="num" id="statRooms">0</div><div class="label">房间</div></div>
                        <div class="stat-card"><div class="num" id="statReports">0</div><div class="label">待处理举报</div></div>
                        <div class="stat-card"><div class="num" id="statBanned">0</div><div class="label">已封禁</div></div>
                        <div class="stat-card"><div class="num" id="statToday">0</div><div class="label">今日消息</div></div>
                    </div>
                    <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:16px;">
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <button class="btn-sm primary" onclick="exportAllData()">📥 导出全部数据</button>
                            <button class="btn-sm danger" onclick="if(confirm('清空缓存？')){localStorage.clear();alert('已清除');}">🧹 清空缓存</button>
                        </div>
                    </div>
                </div>

                <!-- 用户管理 -->
                <div class="page" id="page-users">
                    <div class="input-group">
                        <input type="text" id="userFilter" placeholder="搜索用户..." />
                        <select id="userStatusFilter">
                            <option value="all">全部</option>
                            <option value="active">正常</option>
                            <option value="banned">已封禁</option>
                        </select>
                        <button class="btn-sm primary" onclick="loadUsers()">🔍</button>
                        <button class="btn-sm" onclick="document.getElementById('userFilter').value='';document.getElementById('userStatusFilter').value='all';loadUsers();">✕</button>
                    </div>
                    <div class="batch-actions">
                        <span>批量：</span>
                        <button class="btn-sm danger" onclick="batchBanUsers()">封禁</button>
                        <button class="btn-sm success" onclick="batchUnbanUsers()">解封</button>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr>
                                <th class="checkbox-cell"><input type="checkbox" id="selectAllUsers" onchange="toggleAllUsers()" /></th>
                                <th>用户</th>
                                <th>状态</th>
                                <th>设备</th>
                                <th>登录</th>
                                <th>操作</th>
                            </tr></thead>
                            <tbody id="userTableBody"><tr><td colspan="6" class="empty-state">加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>

                <!-- 消息管理 -->
                <div class="page" id="page-messages">
                    <div class="input-group">
                        <input type="text" id="msgFilterUser" placeholder="用户..." />
                        <input type="text" id="msgFilterRoom" placeholder="房间..." />
                        <button class="btn-sm primary" onclick="loadAllMessages()">🔍</button>
                        <button class="btn-sm" onclick="document.getElementById('msgFilterUser').value='';document.getElementById('msgFilterRoom').value='';loadAllMessages();">✕</button>
                    </div>
                    <div class="batch-actions">
                        <span>批量：</span>
                        <button class="btn-sm danger" onclick="batchDeleteMessages()">删除</button>
                        <button class="btn-sm primary" onclick="exportFilteredMessages()">导出</button>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr>
                                <th class="checkbox-cell"><input type="checkbox" id="selectAllMsgs" onchange="toggleAllMessages()" /></th>
                                <th>时间</th>
                                <th>用户</th>
                                <th>内容</th>
                                <th>操作</th>
                            </tr></thead>
                            <tbody id="msgTableBody"><tr><td colspan="5" class="empty-state">加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>

                <!-- 房间管理 -->
                <div class="page" id="page-rooms">
                    <div class="input-group">
                        <input type="text" id="roomFilter" placeholder="搜索房间..." />
                        <button class="btn-sm primary" onclick="loadRoomsAdmin()">🔍</button>
                        <button class="btn-sm" onclick="document.getElementById('roomFilter').value='';loadRoomsAdmin();">✕</button>
                    </div>
                    <div class="batch-actions">
                        <span>批量：</span>
                        <button class="btn-sm danger" onclick="batchDeleteRooms()">删除房间</button>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr>
                                <th class="checkbox-cell"><input type="checkbox" id="selectAllRooms" onchange="toggleAllRooms()" /></th>
                                <th>房间</th>
                                <th>房主</th>
                                <th>消息数</th>
                                <th>操作</th>
                            </tr></thead>
                            <tbody id="roomTableBody"><tr><td colspan="5" class="empty-state">加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>

                <!-- 举报中心 -->
                <div class="page" id="page-reports">
                    <div class="input-group">
                        <select id="reportStatusFilter">
                            <option value="all">全部</option>
                            <option value="pending">待处理</option>
                            <option value="resolved">已处理</option>
                            <option value="rejected">已驳回</option>
                        </select>
                        <button class="btn-sm primary" onclick="loadReports()">🔍</button>
                        <button class="btn-sm" onclick="document.getElementById('reportStatusFilter').value='all';loadReports();">✕</button>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>举报人</th><th>被举报</th><th>原因</th><th>状态</th><th>操作</th></tr></thead>
                            <tbody id="reportTableBody"><tr><td colspan="5" class="empty-state">加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>

                <!-- 申诉管理 -->
                <div class="page" id="page-appeals">
                    <div class="input-group">
                        <select id="appealStatusFilter">
                            <option value="all">全部</option>
                            <option value="pending">待处理</option>
                            <option value="approved">已通过</option>
                            <option value="rejected">已驳回</option>
                        </select>
                        <button class="btn-sm primary" onclick="loadAppeals()">🔍</button>
                        <button class="btn-sm" onclick="document.getElementById('appealStatusFilter').value='all';loadAppeals();">✕</button>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>申诉人</th><th>内容</th><th>状态</th><th>操作</th></tr></thead>
                            <tbody id="appealTableBody"><tr><td colspan="4" class="empty-state">加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>

                <!-- 日志 -->
                <div class="page" id="page-logs">
                    <div class="tab-bar">
                        <button class="tab active" data-tab="action" onclick="switchLogTab('action')">操作日志</button>
                        <button class="tab" data-tab="login" onclick="switchLogTab('login')">登录日志</button>
                        <button class="tab" data-tab="violation" onclick="switchLogTab('violation')">违规拦截</button>
                    </div>
                    <div class="input-group">
                        <input type="text" id="logFilter" placeholder="搜索..." />
                        <button class="btn-sm primary" onclick="loadLogs()">🔍</button>
                        <button class="btn-sm" onclick="document.getElementById('logFilter').value='';loadLogs();">✕</button>
                        <button class="btn-sm primary" onclick="exportLogs()">📥</button>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead><tr><th>时间</th><th>操作人</th><th>操作</th><th>详情</th></tr></thead>
                            <tbody id="logTableBody"><tr><td colspan="4" class="empty-state">加载中...</td></tr></tbody>
                        </table>
                    </div>
                </div>

                <!-- 设置 -->

        function playSoundDev() {
            if (!soundEnabledDev) return;
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.connect(g);
                g.connect(ctx.destination);
                osc.frequency.value = 660;
                g.gain.setValueAtTime(0.1, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            } catch (_) {}
        }

        function exportFilteredMessages() {
            const rows = document.querySelectorAll('#msgTableBody tr');
            if (rows.length === 0 || rows[0].classList.contains('empty-state')) { alert('没有数据'); return; }
            const data = [];
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length < 4) return;
                data.push({ time: cells[0]?.textContent?.trim() || '', user: cells[1]?.textContent?.trim() || '', content: cells[2]?.textContent?.trim() || '' });
            });
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `messages_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

                selectedRooms.clear();
                loadRoomsAdmin(); loadStats();
            } catch (e) { alert('操作失败: ' + e.message); }
        }

        // ============================================================
        // 举报中心
        // ============================================================
        async function loadReports() {
            try {
                const statusFilter = document.getElementById('reportStatusFilter').value;
                let query = db.from('reports').select('*').order('created_at', { ascending: false });
                const { data, error } = await query;
                if (error) { console.error(error); return; }

                let filtered = data || [];
                if (statusFilter !== 'all') filtered = filtered.filter(r => r.status === statusFilter);

                const tbody = document.getElementById('reportTableBody');
                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">暂无举报</td></tr>';
                    return;
                }

                let html = '';
                filtered.forEach(r => {
                    const isPending = r.status === 'pending';
                    html += `
                        <tr>
                            <td>${escapeHtml(r.reporter)}</td>
                            <td><strong>${escapeHtml(r.reported_user)}</strong></td>
                            <td>${escapeHtml(r.reason || '未填写')}</td>
                            <td><span class="${isPending ? 'badge-pending' : 'badge-resolved'}">${isPending ? '⏳ 待处理' : '✅ 已处理'}</span></td>
                            <td>
                                ${isPending ? `
                                    <button class="btn-sm success" onclick="resolveReport('${r.id}')">✅</button>
                                    <button class="btn-sm warning" onclick="rejectReport('${r.id}')">❌</button>
                                    <button class="btn-sm danger" onclick="banFromReport('${r.id}','${escapeHtml(r.reported_user)}')">⛔</button>
                                ` : '-'}
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            } catch (e) {
                document.getElementById('reportTableBody').innerHTML = '<tr><td colspan="5" class="empty-state">加载失败</td></tr>';
            }
        }

        async function resolveReport(id) {
            try {
                await db.from('reports').update({ status: 'resolved' }).eq('id', id);
                alert('✅ 已处理');
                loadReports(); loadStats();
            } catch (e) { alert('操作失败: ' + e.message); }
        }

        async function rejectReport(id) {
            try {
                await db.from('reports').update({ status: 'rejected' }).eq('id', id);
                alert('✅ 已驳回');
                loadReports();
            } catch (e) { alert('操作失败: ' + e.message); }
        }

        async function banFromReport(id, username) {
            if (!confirm('封禁 ' + username + ' ？')) return;
            try {
                await db.from('users').update({ is_banned: true }).eq('username', username);
                await db.from('reports').update({ status: 'resolved' }).eq('id', id);
                alert('✅ 已封禁 ' + username);
                loadReports(); loadUsers(); loadStats();
            } catch (e) { alert('操作失败: ' + e.message); }
        }

        // ============================================================
        // 申诉管理
        // ============================================================
        async function loadAppeals() {
            try {
                const statusFilter = document.getElementById('appealStatusFilter').value;
                let query = db.from('appeals').select('*').order('created_at', { ascending: false });
                const { data, error } = await query;
                if (error) {
                    document.getElementById('appealTableBody').innerHTML = '<tr><td colspan="4" class="empty-state">需要创建 appeals 表</td></tr>';
                    return;
                }

                let filtered = data || [];
                if (statusFilter !== 'all') filtered = filtered.filter(a => a.status === statusFilter);

                const tbody = document.getElementById('appealTableBody');
                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无申诉</td></tr>';
                    return;
                }

                let html = '';
                filtered.forEach(a => {
                    const isPending = a.status === 'pending';
                    html += `
                        <tr>
                            <td><strong>${escapeHtml(a.username)}</strong></td>
                            <td style="font-size:0.75rem;">${escapeHtml(a.content || '未填写')}</td>
                            <td><span class="${isPending ? 'badge-pending' : 'badge-resolved'}">${isPending ? '⏳ 待处理' : '✅ 已处理'}</span></td>
                            <td>
                                ${isPending ? `
                                    <button class="btn-sm success" onclick="approveAppeal('${a.id}','${escapeHtml(a.username)}')">通过</button>
                                    <button class="btn-sm danger" onclick="rejectAppeal('${a.id}')">驳回</button>
                                ` : '-'}
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            } catch (e) {
                document.getElementById('appealTableBody').innerHTML = '<tr><td colspan="4" class="empty-state">加载失败</td></tr>';
            }
        }

        async function approveAppeal(id, username) {
            if (!confirm('通过 ' + username + ' 的申诉？')) return;
            try {
                await db.from('users').update({ is_banned: false, ban_reason: null }).eq('username', username);
                await db.from('appeals').update({ status: 'approved' }).eq('id', id);
                alert('✅ 已通过，用户已解封');
                loadAppeals(); loadUsers(); loadStats();
            } catch (e) { alert('操作失败: ' + e.message); }
        }

        async function rejectAppeal(id) {
            try {
                await db.from('appeals').update({ status: 'rejected' }).eq('id', id);
                alert('✅ 已驳回');
                loadAppeals();
            } catch (e) { alert('操作失败: ' + e.message); }
        }

        // ============================================================
        // 日志
        // ============================================================
        function switchLogTab(tab) {
            currentLogTab = tab;
            document.querySelectorAll('#page-logs .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            loadLogs();
        }

        async function loadLogs() {
            try {
                const filter = document.getElementById('logFilter').value.trim().toLowerCase();
                let table = 'action_logs';
                if (currentLogTab === 'login') table = 'login_logs';
                if (currentLogTab === 'violation') table = 'violation_logs';

                let query = db.from(table).select('*').order('created_at', { ascending: false }).limit(100);
                const { data, error } = await query;
                if (error) {
                    document.getElementById('logTableBody').innerHTML = `<tr><td colspan="4" class="empty-state">表 ${table} 不存在</td></tr>`;
                    return;
                }

                let filtered = data || [];
                if (filter) filtered = filtered.filter(l => JSON.stringify(l).toLowerCase().includes(filter));

                const tbody = document.getElementById('logTableBody');
                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无日志</td></tr>';
                    return;
                }

                let html = '';
                filtered.forEach(l => {
                    const operator = l.operator || l.username || '系统';
                    const action = l.action || '登录';
                    const detail = l.detail || l.device || '';
                    html += `
                        <tr>
                            <td style="font-size:0.65rem;white-space:nowrap;">${formatShortTime(l.created_at)}</td>
                            <td>${escapeHtml(operator)}</td>
                            <td>${escapeHtml(action)}</td>
                            <td style="font-size:0.7rem;">${escapeHtml(detail)}</td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            } catch (e) {
                document.getElementById('logTableBody').innerHTML = '<tr><td colspan="4" class="empty-state">加载失败</td></tr>';
            }
        }

        function exportLogs() {
            const rows = document.querySelectorAll('#logTableBody tr');
            if (rows.length === 0 || rows[0].classList.contains('empty-state')) { alert('没有数据'); return; }
            const data = [];
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length < 4) return;
                data.push({ time: cells[0]?.textContent?.trim() || '', operator: cells[1]?.textContent?.trim() || '', action: cells[2]?.textContent?.trim() || '', detail: cells[3]?.textContent?.trim() || '' });
            });
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `logs_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ============================================================
        // 设置
        // ============================================================
        function applyTheme() {
            const p = document.getElementById('primaryColor').value;
            const s = document.getElementById('secondaryColor').value;
            document.documentElement.style.setProperty('--primary', p);
            document.documentElement.style.setProperty('--primary-light', p + '99');
            document.documentElement.style.setProperty('--secondary', s);
            document.documentElement.style.setProperty('--secondary-light', s + '99');
        }

        function resetTheme() {
            document.getElementById('primaryColor').value = '#6C5CE7';
            document.getElementById('secondaryColor').value = '#00B894';
            document.documentElement.style.setProperty('--primary', '#6C5CE7');
            document.documentElement.style.setProperty('--primary-light', '#a29bfe');
            document.documentElement.style.setProperty('--secondary', '#00B894');
            document.documentElement.style.setProperty('--secondary-light', '#55efc4');
        }

        function toggleTheme() { document.body.classList.toggle('light'); }

        function toggleSoundDev() {
            soundEnabledDev = document.getElementById('soundToggleDev').checked;
        }

        function saveAnnouncement() {
            const text = document.getElementById('siteAnnouncement').value.trim();
            localStorage.setItem('site_announcement', text);
            alert('✅ 公告已保存');
        }

        function toggleMaintenance() {
            const checked = document.getElementById('maintenanceMode').checked;
            localStorage.setItem('maintenance_mode', checked ? 'true' : 'false');
            alert(checked ? '🔧 维护模式已开启' : '✅ 维护模式已关闭');
        }

        // ============================================================
        // 导出全部
        // ============================================================
        async function exportAllData() {
            try {
                const { data: users } = await db.from('users').select('*');
                const { data: messages } = await db.from('messages').select('*').limit(500);
                const { data: reports } = await db.from('reports').select('*');
                const data = { users, messages, reports, exportedAt: new Date().toISOString() };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `starrychat_export_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                alert('✅ 导出成功');
            } catch (e) { alert('导出失败: ' + e.message); }
        }
    </script>
</body>
</html>
