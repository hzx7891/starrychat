<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>星迹 StarryChat</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236C5CE7'/%3E%3Cstop offset='100%25' stop-color='%2300B894'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='48' fill='url(%23g)'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='white' font-family='system-ui'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js">
    </script>
    <style>
        /* ===== 样式精简但完整，保持原有UI ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --primary: #6C5CE7; --primary-light: #a29bfe; --secondary: #00B894;
            --bg-primary: #0a0a1a; --bg-secondary: #12122a;
            --bg-surface: rgba(255,255,255,0.05); --bg-card: rgba(255,255,255,0.06);
            --text-primary: #f0f0f5; --text-secondary: #a8a8c8; --text-muted: #6a6a8a;
            --border-color: rgba(255,255,255,0.08);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.4); --shadow-md: 0 8px 32px rgba(0,0,0,0.5);
            --shadow-lg: 0 16px 64px rgba(0,0,0,0.6);
            --radius-md: 14px; --radius-lg: 20px; --radius-full: 9999px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
            --sidebar-width: 280px; --header-height: 60px;
        }
        body.light {
            --bg-primary: #f0f0f5; --bg-secondary: #e8e8f0;
            --bg-surface: rgba(255,255,255,0.7); --bg-card: rgba(255,255,255,0.8);
            --text-primary: #1a1a2e; --text-secondary: #4a4a6a; --text-muted: #8a8aaa;
            --border-color: rgba(0,0,0,0.08);
        }
        html, body { height:100%; font-family:var(--font); background:var(--bg-primary); color:var(--text-primary); overflow:hidden; }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-thumb { background:var(--primary); border-radius:var(--radius-full); }

        .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 28px; border:none; border-radius:var(--radius-full); font-size:0.95rem; font-weight:600; cursor:pointer; transition:all var(--transition); }
        .btn-primary { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff; box-shadow:0 4px 20px rgba(108,92,231,0.35); }
        .btn-primary:hover { transform:translateY(-2px) scale(1.02); box-shadow:0 8px 32px rgba(108,92,231,0.45); }
        .btn-secondary { background:var(--bg-surface); color:var(--text-primary); border:1px solid var(--border-color); backdrop-filter:blur(12px); }
        .btn-secondary:hover { background:var(--bg-surface-hover); transform:translateY(-2px); }
        .input-field { width:100%; padding:14px 18px; border-radius:var(--radius-md); border:1px solid var(--border-color); background:var(--bg-surface); color:var(--text-primary); font-size:0.95rem; outline:none; transition:all var(--transition); backdrop-filter:blur(8px); }
        .input-field:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(108,92,231,0.15); background:var(--bg-surface-hover); }
        .card { background:var(--bg-card); backdrop-filter:blur(20px); border:1px solid var(--border-color); border-radius:var(--radius-lg); box-shadow:var(--shadow-md); }
        .avatar { width:40px; height:40px; border-radius:50%; object-fit:cover; flex-shrink:0; border:2px solid var(--border-color); background:var(--bg-surface); }
        .avatar-sm { width:32px; height:32px; border-width:1.5px; }
        .avatar-lg { width:72px; height:72px; border-width:3px; }
        .icon-btn { width:40px; height:40px; border-radius:50%; border:none; background:transparent; color:var(--text-secondary); font-size:1.2rem; cursor:pointer; transition:all var(--transition); display:inline-flex; align-items:center; justify-content:center; }
        .icon-btn:hover { background:var(--bg-surface); color:var(--text-primary); transform:scale(1.05); }

        /* ===== 欢迎页 ===== */
        #welcomePage { position:fixed; inset:0; background:var(--bg-primary); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:1000; padding:20px; }
        #welcomePage .card { max-width:500px; width:100%; padding:48px 40px; text-align:center; animation:fadeUp 0.8s ease; }
        @keyframes fadeUp { from{ opacity:0; transform:translateY(30px) scale(0.96); } to{ opacity:1; transform:translateY(0) scale(1); } }
        .welcome-icon { font-size:4rem; display:block; animation:float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-12px); } }
        .welcome-title { font-size:2.4rem; font-weight:800; background:linear-gradient(135deg,var(--primary-light),var(--secondary-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .typewriter-text { font-size:1.4rem; font-weight:600; border-right:2px solid var(--primary); padding-right:4px; white-space:nowrap; overflow:hidden; animation:blink 0.8s step-end infinite; }
        @keyframes blink { 0%,100%{ border-color:var(--primary); } 50%{ border-color:transparent; } }
        .welcome-btns { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-top:8px; }

        /* ===== 认证页 ===== */
        #authPage { position:fixed; inset:0; background:var(--bg-primary); display:none; justify-content:center; align-items:center; z-index:999; padding:20px; }
        .auth-box { width:400px; max-width:100%; padding:40px 36px; animation:fadeUp 0.6s ease; }
        .auth-box h2 { font-size:1.6rem; font-weight:700; text-align:center; background:linear-gradient(135deg,var(--primary-light),var(--secondary-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .auth-box .input-field { margin-bottom:14px; }
        .auth-box .btn { width:100%; margin-top:4px; }
        .auth-box .switch { text-align:center; margin-top:18px; color:var(--text-secondary); cursor:pointer; }
        .auth-box .switch:hover { color:var(--primary-light); }
        .auth-box .error { color:#e74c3c; text-align:center; margin-top:10px; font-size:0.85rem; min-height:1.4rem; }
        .auth-box .legal-text { font-size:0.7rem; color:var(--text-muted); margin-top:16px; line-height:1.6; }
        .auth-box .legal-text a { color:var(--primary-light); text-decoration:none; }
        .auth-box .legal-text a:hover { text-decoration:underline; }
        .remember-row { display:flex; align-items:center; gap:10px; margin:6px 0 18px; color:var(--text-secondary); font-size:0.9rem; cursor:pointer; user-select:none; }
        .remember-row input[type="checkbox"] { accent-color:var(--primary); width:18px; height:18px; cursor:pointer; }

        /* ===== 签名页 ===== */
        #signaturePage { position:fixed; inset:0; background:var(--bg-primary); display:none; justify-content:center; align-items:center; z-index:1001; padding:20px; }
        .signature-box { width:420px; max-width:100%; padding:40px 36px; text-align:center; animation:fadeUp 0.6s ease; }
        .signature-box h2 { font-size:1.5rem; font-weight:700; background:linear-gradient(135deg,var(--primary-light),var(--secondary-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .signature-box textarea { resize:none; height:90px; margin-bottom:20px; }
        .signature-box .btn { width:100%; }
        .signature-box .avatar-upload { display:flex; align-items:center; gap:16px; margin-bottom:20px; justify-content:center; }
        .signature-box .avatar-upload img { width:72px; height:72px; border-radius:50%; object-fit:cover; border:3px solid var(--border-color); cursor:pointer; transition:all var(--transition); }
        .signature-box .avatar-upload img:hover { border-color:var(--primary); transform:scale(1.04); }

        /* ===== 聊天主界面 ===== */
        #chatApp { display:none; width:100%; height:100%; flex-direction:column; background:var(--bg-primary); }
        .top-bar { display:flex; justify-content:space-between; align-items:center; padding:0 24px; height:var(--header-height); background:var(--bg-card); backdrop-filter:blur(20px); border-bottom:1px solid var(--border-color); flex-shrink:0; z-index:10; }
        .top-bar .brand { font-size:1.2rem; font-weight:700; display:flex; align-items:center; gap:10px; color:var(--text-primary); }
        .top-bar .brand span { background:linear-gradient(135deg,var(--primary-light),var(--secondary-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .main-area { display:flex; flex:1; overflow:hidden; }
        .sidebar { width:var(--sidebar-width); background:var(--bg-card); backdrop-filter:blur(20px); border-right:1px solid var(--border-color); display:flex; flex-direction:column; flex-shrink:0; transition:transform var(--transition); z-index:20; }
        .sidebar-header { padding:16px 20px 8px; font-size:0.75rem; font-weight:600; text-transform:uppercase; color:var(--text-muted); }
        .room-list { flex:1; overflow-y:auto; padding:4px 12px 12px; }
        .room-item { padding:10px 16px; border-radius:var(--radius-md); margin-bottom:2px; cursor:pointer; color:var(--text-secondary); transition:all var(--transition); display:flex; align-items:center; gap:10px; font-size:0.92rem; font-weight:500; justify-content:space-between; }
        .room-item:hover { background:var(--bg-surface-hover); color:var(--text-primary); }
        .room-item.active { background:var(--bg-surface); color:var(--text-primary); box-shadow:inset 3px 0 0 var(--primary); }
        .room-item .room-actions { display:flex; gap:4px; opacity:0; transition:opacity var(--transition); }
        .room-item:hover .room-actions { opacity:1; }
        .room-item .room-actions button { background:rgba(0,0,0,0.5); border:none; color:#fff; font-size:0.55rem; padding:2px 8px; border-radius:var(--radius-full); cursor:pointer; transition:all 0.2s; }
        .room-item .room-actions button:hover { background:rgba(231,76,60,0.8); }
        .create-room-btn { margin:8px 12px 16px; padding:12px; background:var(--bg-surface); border:1px dashed var(--border-color); border-radius:var(--radius-md); color:var(--text-secondary); font-weight:600; font-size:0.9rem; cursor:pointer; transition:all var(--transition); }
        .create-room-btn:hover { background:var(--bg-surface-hover); color:var(--text-primary); border-color:var(--primary); }
        .chat-area { flex:1; display:flex; flex-direction:column; background:var(--bg-primary); min-width:0; }
        .chat-header { padding:12px 24px; border-bottom:1px solid var(--border-color); display:flex; align-items:center; gap:12px; flex-shrink:0; background:var(--bg-card); backdrop-filter:blur(12px); }
        .chat-header .room-name { font-size:1.05rem; font-weight:600; }
        .chat-header .room-meta { color:var(--text-muted); font-size:0.8rem; margin-left:auto; }
        .member-list { padding:6px 24px; border-bottom:1px solid var(--border-color); display:flex; gap:8px; flex-wrap:wrap; flex-shrink:0; min-height:44px; align-items:center; background:var(--bg-card); backdrop-filter:blur(8px); }
        .member-list .member-tag { display:flex; align-items:center; gap:6px; padding:4px 12px 4px 6px; border-radius:var(--radius-full); background:var(--bg-surface); font-size:0.8rem; color:var(--text-secondary); cursor:pointer; transition:all var(--transition); border:1px solid transparent; }
        .member-list .member-tag:hover { background:var(--bg-surface-hover); border-color:var(--border-color); color:var(--text-primary); }
        .member-list .member-tag .avatar { width:24px; height:24px; border-width:1px; }
        .member-list .member-tag .online-dot { width:8px; height:8px; border-radius:50%; background:var(--secondary); display:inline-block; margin-left:2px; }
        .search-bar { display:flex; align-items:center; gap:8px; padding:6px 20px; background:var(--bg-card); backdrop-filter:blur(8px); border-bottom:1px solid var(--border-color); flex-shrink:0; }
        .search-bar input { flex:1; padding:8px 14px; border-radius:var(--radius-full); border:1px solid var(--border-color); background:var(--bg-surface); color:var(--text-primary); font-size:0.85rem; outline:none; transition:all var(--transition); }
        .search-bar input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(108,92,231,0.1); }

        #chatMessages { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:8px; background:var(--bg-primary); }
        .load-more-trigger { text-align:center; padding:12px 0; color:var(--text-muted); font-size:0.8rem; cursor:pointer; transition:all var(--transition); border:none; background:transparent; font-family:var(--font); display:block; }
        .load-more-trigger:hover { color:var(--text-primary); }
        .load-more-trigger.loading { color:var(--text-muted); cursor:default; }
        .load-more-trigger .loader { width:16px; height:16px; border:2px solid var(--border-color); border-top:2px solid var(--primary); border-radius:50%; display:inline-block; animation:spin 0.8s linear infinite; }

        .msg { display:flex; align-items:flex-start; gap:12px; padding:12px 18px; border-radius:var(--radius-md); max-width:72%; word-break:break-word; animation:msgIn 0.25s ease-out; position:relative; transition:all var(--transition); }
        @keyframes msgIn { from{ opacity:0; transform:translateY(12px) scale(0.96); } to{ opacity:1; transform:translateY(0) scale(1); } }
        .msg.self { align-self:flex-end; background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff; border-bottom-right-radius:4px; }
        .msg.other { align-self:flex-start; background:var(--bg-card); backdrop-filter:blur(12px); border:1px solid var(--border-color); border-bottom-left-radius:4px; }
        .msg.system-msg { align-self:center; max-width:85%; background:linear-gradient(135deg,rgba(241,196,15,0.18),rgba(241,196,15,0.05)); border:1px solid rgba(241,196,15,0.35); border-radius:var(--radius-full); padding:8px 24px; }
        .msg.system-msg .msg-username { color:#f1c40f !important; font-weight:700; }
        .msg .avatar { width:36px; height:36px; border-width:2px; flex-shrink:0; cursor:pointer; }
        .msg .msg-content { flex:1; min-width:0; }
        .msg .msg-username { font-size:0.75rem; font-weight:600; color:var(--text-secondary); margin-bottom:2px; }
        .msg.self .msg-username { color:rgba(255,255,255,0.7); }
        .msg .msg-text { font-size:0.95rem; line-height:1.5; }
        .msg .msg-time { font-size:0.6rem; color:var(--text-muted); margin-top:4px; opacity:0.7; cursor:default; position:relative; }
        .msg .msg-time .full-date { display:none; position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:var(--bg-secondary); color:var(--text-primary); font-size:0.6rem; padding:4px 10px; border-radius:var(--radius-sm); border:1px solid var(--border-color); white-space:nowrap; z-index:10; opacity:0; transition:opacity 0.2s; }
        .msg .msg-time:hover .full-date { display:block; opacity:1; }
        .msg .msg-img { max-width:240px; border-radius:var(--radius-sm); margin-top:4px; cursor:pointer; transition:transform var(--transition); }
        .msg .msg-img:hover { transform:scale(1.02); }
        .msg-actions { position:absolute; top:4px; right:6px; display:flex; gap:4px; opacity:0; transition:opacity var(--transition); }
        .msg:hover .msg-actions { opacity:1; }
        .msg-actions button { background:rgba(0,0,0,0.6); border:none; color:#fff; font-size:0.55rem; padding:2px 8px; border-radius:var(--radius-full); cursor:pointer; backdrop-filter:blur(4px); transition:all 0.2s; }
        .msg-actions .report-btn:hover { background:rgba(243,156,18,0.8); }
        .msg-actions .delete-btn:hover { background:rgba(231,76,60,0.8); }

        .input-area { display:flex; align-items:center; gap:10px; padding:10px 20px; border-top:1px solid var(--border-color); background:var(--bg-card); backdrop-filter:blur(20px); flex-shrink:0; min-height:64px; }
        .input-area input[type="text"] { flex:1; padding:10px 18px; border-radius:var(--radius-full); border:1px solid var(--border-color); background:var(--bg-surface); color:var(--text-primary); font-size:0.95rem; outline:none; transition:all var(--transition); }
        .input-area input[type="text"]:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(108,92,231,0.1); }
        .send-btn { width:44px; height:44px; border-radius:50%; border:none; background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff; font-size:1.2rem; cursor:pointer; transition:all var(--transition); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(108,92,231,0.3); flex-shrink:0; }
        .send-btn:hover { transform:scale(1.06); box-shadow:0 6px 24px rgba(108,92,231,0.4); }

        #emojiPanel { display:none; padding:12px 16px; background:var(--bg-card); backdrop-filter:blur(20px); border-top:1px solid var(--border-color); flex-shrink:0; }
        #emojiGrid { display:grid; grid-template-columns:repeat(8,1fr); gap:6px; max-height:140px; overflow-y:auto; }
        #emojiGrid span { font-size:1.5rem; cursor:pointer; padding:4px; border-radius:var(--radius-sm); text-align:center; transition:all var(--transition); }
        #emojiGrid span:hover { background:var(--bg-surface); transform:scale(1.2); }

        #menuToggle { display:none; position:fixed; top:12px; left:12px; z-index:100; width:42px; height:42px; border-radius:50%; border:none; background:var(--bg-card); backdrop-filter:blur(12px); color:var(--text-primary); font-size:1.2rem; cursor:pointer; border:1px solid var(--border-color); }
        @media (max-width:768px) {
            #menuToggle { display:flex; align-items:center; justify-content:center; }
            .sidebar { position:fixed; left:0; top:0; height:100%; transform:translateX(-100%); width:280px; z-index:90; border-right:1px solid var(--border-color); box-shadow:var(--shadow-lg); }
            .sidebar.show { transform:translateX(0); }
            .chat-area { width:100%; }
            .msg { max-width:88% !important; }
        }

        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); justify-content:center; align-items:center; z-index:200; padding:20px; }
        .modal-overlay.active { display:flex; }
        .modal-content { background:var(--bg-card); backdrop-filter:blur(24px); border:1px solid var(--border-color); border-radius:var(--radius-lg); padding:32px; max-width:440px; width:100%; max-height:80vh; display:flex; flex-direction:column; animation:modalPop 0.3s ease; box-shadow:var(--shadow-lg); }
        @keyframes modalPop { from{ opacity:0; transform:scale(0.92) translateY(16px); } to{ opacity:1; transform:scale(1) translateY(0); } }
        .modal-content h3 { font-size:1.2rem; font-weight:700; margin-bottom:12px; }
        .modal-content .modal-body { flex:1; overflow-y:auto; padding:4px 0; }
        .modal-content .modal-actions { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
        .modal-content .modal-actions .btn { flex:1; min-width:80px; }

        #videoCallModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); backdrop-filter:blur(16px); z-index:300; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        #videoCallModal.active { display:flex; }
        .video-grid { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; width:100%; max-width:800px; }
        .video-grid video { width:100%; max-width:380px; border-radius:var(--radius-md); background:#000; box-shadow:var(--shadow-md); border:2px solid var(--border-color); object-fit:cover; aspect-ratio:4/3; }
        .video-controls { margin-top:24px; display:flex; gap:16px; }

        #privateChatContent .private-msgs { flex:1; overflow-y:auto; padding:8px 4px; margin:8px 0 12px; max-height:300px; background:var(--bg-primary); border-radius:var(--radius-sm); display:flex; flex-direction:column; gap:6px; }
        #privateChatContent .private-input { display:flex; gap:10px; margin-top:4px; }
        #privateChatContent .private-input input { flex:1; padding:10px 16px; border-radius:var(--radius-full); border:1px solid var(--border-color); background:var(--bg-surface); color:var(--text-primary); outline:none; }
        #privateChatContent .private-input input:focus { border-color:var(--primary); }

        .hidden { display:none !important; }
        .text-center { text-align:center; }
        .text-muted { color:var(--text-muted); }
        .text-secondary { color:var(--text-secondary); }
        .text-danger { color:#e74c3c; }
        .text-success { color:var(--secondary); }
        .mt-8 { margin-top:8px; }
        .mt-16 { margin-top:16px; }
        .flex { display:flex; }
        .flex-center { align-items:center; justify-content:center; }
        .gap-8 { gap:8px; }
        .gap-12 { gap:12px; }
        .w-full { width:100%; }
        .link-safe { color:var(--primary-light); text-decoration:none; }
        .link-safe:hover { text-decoration:underline; }
        .room-not-found { text-align:center; padding:80px 20px; }
        .room-not-found .icon { font-size:4rem; margin-bottom:16px; }
        .room-not-found h2 { font-size:1.5rem; margin-bottom:8px; }
        .room-not-found p { color:var(--text-muted); }
        .room-not-found .btn { margin-top:20px; }
    </style>
</head>
<body>

    <button id="menuToggle" onclick="toggleSidebar()">☰</button>

    <!-- ===== 欢迎页 ===== -->
    <div id="welcomePage">
        <div class="card">
            <span class="welcome-icon">✧</span>
            <div class="welcome-title">星迹 StarryChat</div>
            <div class="welcome-sub">连接每一颗星 · 开启你的聊天之旅</div>
            <div class="typewriter-wrap">
                <span class="typewriter-text" id="typewriterText"></span>
                <span class="typewriter-emoji" id="typewriterEmoji">✨</span>
            </div>
            <div class="welcome-btns">
                <button class="btn btn-primary" onclick="showSignaturePage()">✨ 开始个性化</button>
                <button class="btn btn-secondary" onclick="skipToAuth()">跳过 →</button>
            </div>
        </div>
    </div>

    <!-- ===== 签名页 ===== -->

            const urlRegex = /(https?:\/\/[^\s]+)/g;

                document.getElementById('regError').innerText = '注册失败，请重试';

            }
        }

        async function autoLogin() {
            if (checkMaintenance()) {
                document.getElementById('welcomePage').style.display = 'flex';
                runTypeWriter();
                return;
            }
            const savedToken = localStorage.getItem('starry_remember');
            const savedDevice = localStorage.getItem('starry_device');
            if (savedToken) {
                try {
                    const { data, error } = await db.from('users')
                        .select('username, avatar, signature, remember_expires, is_banned, ban_reason, remember_device, role')
                        .eq('remember_token', savedToken)
                        .single();
                    if (data && !error && new Date(data.remember_expires) > new Date()) {
                        if (data.remember_device && savedDevice && data.remember_device !== savedDevice) {
                            localStorage.removeItem('starry_remember');
                            localStorage.removeItem('starry_device');
                            document.getElementById('welcomePage').style.display = 'flex';
                            runTypeWriter();
                            return;
                        }
                        if (data.is_banned) {
                            localStorage.removeItem('starry_remember');
                            localStorage.removeItem('starry_device');
                            alert('⛔ 该账号已被封禁\n原因：' + (data.ban_reason || '未说明'));
                            document.getElementById('welcomePage').style.display = 'flex';
                            runTypeWriter();
                            return;
                        }
                        currentUser = {
                            username: data.username,
                            avatar: data.avatar || '',
                            signature: data.signature || '',
                            salt: ''
                        };
                        isAdmin = data.role === 'admin' || data.username === 'hzx7891';
                        if (!currentUser.signature && !currentUser.avatar) {
                            showSignaturePage();
                            return;
                        }
                        enterChat();
                        return;
                    } else {
                        localStorage.removeItem('starry_remember');
                        localStorage.removeItem('starry_device');
                    }
                } catch(_) {
                    localStorage.removeItem('starry_remember');
                    localStorage.removeItem('starry_device');
                }
            }
            document.getElementById('welcomePage').style.display = 'flex';
            runTypeWriter();
        }

        // ============================================================
        // 主聊天逻辑
        // ============================================================
        function enterChat() {
            stopBanMonitoring();
            stopMaintenanceMonitoring();
            if (roomSubscription) {
                try { db.removeChannel(roomSubscription); } catch(_) {}
                roomSubscription = null;
            }

            document.getElementById('authPage').style.display = 'none';
            document.getElementById('welcomePage').style.display = 'none';
            document.getElementById('signaturePage').style.display = 'none';
            document.getElementById('chatApp').style.display = 'flex';
            const avatarUrl = getAvatarUrl(currentUser.username, currentUser.avatar);
            document.getElementById('myAvatar').src = avatarUrl;

            const roomFromURL = detectRoomFromURL();
            if (roomFromURL) {
                checkAndSwitchRoom(roomFromURL);
            } else {
                loadRooms();
                loadMessages('大厅', true);
                subscribeToMessages();
                subscribePrivateMessages();
                subscribeCalls();
                updateMemberList();
                document.getElementById('chatRoomName').textContent = '🏠 大厅';
            }

            subscribeRooms();
            startBanMonitoring();
            startMaintenanceMonitoring();

            const announcement = localStorage.getItem('site_announcement');
            if (announcement) {
                console.log('📢 公告：', announcement);
            }

            document.getElementById('chatArea').addEventListener('click', function() {
                const sidebar = document.getElementById('sidebar');
                if (sidebar.classList.contains('show')) sidebar.classList.remove('show');
            });

            setTimeout(() => {
                document.getElementById('messageInput').focus();
            }, 300);
        }

        function stopBanMonitoring() {
            if (banCheckInterval) { clearInterval(banCheckInterval); banCheckInterval = null; }
            if (banSubscription) {
                try { db.removeChannel(banSubscription); } catch(_) {}
                banSubscription = null;
            }
        }

        function stopMaintenanceMonitoring() {
            if (maintenanceCheckInterval) { clearInterval(maintenanceCheckInterval); maintenanceCheckInterval = null; }
        }

        function startMaintenanceMonitoring() {
            stopMaintenanceMonitoring();
            maintenanceCheckInterval = setInterval(() => {
                try {
                    const maintenance = localStorage.getItem('maintenance_mode');
                    if (maintenance === 'true') {
                        alert('🔧 系统已进入维护模式，即将退出');
                        logout();
                    }
                } catch(_) {}
            }, 10000);
        }

        function startBanMonitoring() {
            stopBanMonitoring();
            banCheckInterval = setInterval(async () => {
                try {
                    const { data } = await db.from('users')
                        .select('is_banned, ban_reason')
                        .eq('username', currentUser.username)
                        .single();
                    if (data && data.is_banned) {
                        alert('⛔ 你的账号已被封禁\n原因：' + (data.ban_reason || '未说明'));
                        logout();
                    }
                } catch(_) {}
            }, 7891);

            banSubscription = db.channel('user-ban-' + currentUser.username)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'users',
                    filter: 'username=eq.' + currentUser.username
                }, payload => {
                    if (payload.new && payload.new.is_banned) {
                        alert('⛔ 你的账号已被封禁\n原因：' + (payload.new.ban_reason || '未说明'));
                        logout();
                    }
                })
                .subscribe();
        }

        function subscribeRooms() {
            if (roomSubscription) {
                try { db.removeChannel(roomSubscription); } catch(_) {}
                roomSubscription = null;
            }
            roomSubscription = db.channel('room-list-refresh')
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages'
                }, payload => {
                    const newRoom = payload.new.room;
                    if (newRoom && !currentRoomList.includes(newRoom)) {
                        currentRoomList.push(newRoom);
                        loadRooms();
                    }
                })
                .subscribe();
        }

        function logout() {
            stopBanMonitoring();
            stopMaintenanceMonitoring();
            if (roomSubscription) {
                try { db.removeChannel(roomSubscription); } catch(_) {}
                roomSubscription = null;
            }
            hangUp();
            currentUser = { username: '', avatar: '', signature: '', salt: '' };
            isAdmin = false;
            localStorage.removeItem('starry_remember');
            localStorage.removeItem('starry_device');
            document.getElementById('chatApp').style.display = 'none';
            document.getElementById('authPage').style.display = 'flex';
            wsChannels.forEach(ch => { try { db.removeChannel(ch); } catch(_) {} });
            wsChannels = [];
            if (pc) { pc.close(); pc = null; }
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            document.getElementById('videoCallModal').classList.remove('active');
            document.getElementById('videoCallModal').style.display = 'none';
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('localVideo').srcObject = null;
            currentPage = 0;
            hasMoreMessages = true;
            oldestMessageCreatedAt = null;
        }

        // ============================================================
        // 房间
        // ============================================================
        let roomOwners = {};

        async function loadRooms() {
            const list = document.getElementById('roomList');
            let rooms = ['大厅'];
            const { data } = await db.from('messages').select('room, room_owner').order('created_at', { ascending: false }).limit(1000);
            if (data) {
                const roomSet = new Set();
                data.forEach(m => {
                    if (m.room) roomSet.add(m.room);
                    if (m.room && m.room_owner) roomOwners[m.room] = m.room_owner;
                });
                roomSet.forEach(r => { if (r !== '大厅') rooms.push(r); });
            }
            currentRoomList = rooms;
            list.innerHTML = '';
            rooms.forEach(room => {
                const div = document.createElement('div');
                div.className = 'room-item' + (room === currentRoom ? ' active' : '');
                const isOwner = room !== '大厅' && roomOwners[room] === currentUser.username;
                const ownerLabel = isOwner ? ' 👑' : '';
                div.innerHTML = `
                    <span>${room === '大厅' ? '🏠' : '🔒'} ${room}${ownerLabel}</span>
                    ${room !== '大厅' ? `
                        <span class="room-actions">
                            ${isOwner || isAdmin ? `<button class="delete-room-btn" data-room="${escapeHtml(room)}" title="删除房间">✕</button>` : ''}
                        </span>
                    ` : ''}
                `;
                const deleteBtn = div.querySelector('.delete-room-btn');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const roomName = this.dataset.room;
                        deleteRoom(roomName);
                    });
                }
                div.addEventListener('click', function(e) {
                    if (e.target.closest('.room-actions')) return;
                    switchRoom(room);
                });
                list.appendChild(div);
            });
        }

        function switchRoom(room) {
            if (room !== '大厅') {
                const basePath = window.location.pathname.replace(/\/[^\/]*$/, '');
                const newUrl = window.location.origin + basePath + '/' + encodeURIComponent(room);
                window.history.pushState({ room: room }, '', newUrl);
            } else {
                const basePath = window.location.pathname.replace(/\/[^\/]*$/, '');
                window.history.pushState({ room: '大厅' }, '', window.location.origin + basePath + '/');
            }

            wsChannels = wsChannels.filter(ch => {
                if (ch.topic && ch.topic.includes('messages')) {
                    try { db.removeChannel(ch); } catch(_) {}
                    return false;
                }
                return true;
            });

            currentRoom = room;
            document.getElementById('chatRoomName').textContent = room === '大厅' ? '🏠 大厅' : '🔒 ' + room;
            document.getElementById('chatMessages').innerHTML = '';
            currentPage = 0;
            hasMoreMessages = true;
            oldestMessageCreatedAt = null;
            const trigger = document.createElement('div');
            trigger.className = 'load-more-trigger';
            trigger.id = 'loadMoreTrigger';
            trigger.textContent = '⬆ 点击加载更早消息';
            trigger.onclick = loadMoreMessages;
            document.getElementById('chatMessages').appendChild(trigger);
            loadMessages(room, true);
            subscribeToMessages();
            document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.room-item').forEach(item => {
                if (item.textContent.includes(room) || (room === '大厅' && item.textContent.includes('🏠'))) item.classList.add('active');
            });
            document.getElementById('sidebar').classList.remove('show');
            updateMemberList();

            setTimeout(() => {
                document.getElementById('messageInput').focus();
            }, 300);
        }

        async function showCreateRoom() {
            const name = prompt('🏷️ 输入房间名：');
            if (name && name.trim()) {
                const roomName = name.trim();
                let exists = false;
                document.querySelectorAll('.room-item').forEach(el => {
                    if (el.textContent.includes(roomName)) exists = true;
                });
                if (!exists) {
                    roomOwners[roomName] = currentUser.username;
                    await db.from('messages').insert({
                        room: roomName,
                        username: '🛡️ 系统',
                        content: '✨ 房间 "' + roomName + '" 已创建！欢迎来聊天～',
                        type: 'text',
                        avatar: '',
                        room_owner: currentUser.username,
                        created_at: new Date().toISOString()
                    });
                    const div = document.createElement('div');
                    div.className = 'room-item';
                    div.innerHTML = `
                        <span>🔒 ${roomName} 👑</span>
                        <span class="room-actions">
                            <button class="delete-room-btn" data-room="${escapeHtml(roomName)}" title="删除房间">✕</button>
                        </span>
                    `;
                    const deleteBtn = div.querySelector('.delete-room-btn');
                    if (deleteBtn) {
                        deleteBtn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            deleteRoom(this.dataset.room);
                        });
                    }
                    div.onclick = (e) => {
                        if (e.target.closest('.room-actions')) return;
                        switchRoom(roomName);
                    };
                    document.getElementById('roomList').appendChild(div);
                    const basePath = window.location.pathname.replace(/\/[^\/]*$/, '');
                    window.history.pushState({ room: roomName }, '', window.location.origin + basePath + '/' + encodeURIComponent(roomName));
                }
                switchRoom(roomName);
            }
        }

        async function deleteRoom(room) {
            if (room === '大厅') { alert('不能删除大厅'); return; }
            if (!confirm(`确认删除房间 "${room}" 及其所有消息？`)) return;
            try {
                await db.from('messages').delete().eq('room', room);
                document.querySelectorAll('.room-item').forEach(el => {
                    if (el.textContent.includes(room)) el.remove();
                });
                if (currentRoom === room) {
                    const basePath = window.location.pathname.replace(/\/[^\/]*$/, '');
                    window.history.pushState({ room: '大厅' }, '', window.location.origin + basePath + '/');
                    switchRoom('大厅');
                }
                alert('✅ 房间已删除');
                delete roomOwners[room];
                currentRoomList = currentRoomList.filter(r => r !== room);
            } catch(e) { alert('删除失败: ' + e.message); }
        }

        // ============================================================
        // 消息系统（新消息直接追加到末尾）
        // ============================================================
        async function loadMessages(room, reset = true) {
            if (reset) {
                currentPage = 0;
                hasMoreMessages = true;
                oldestMessageCreatedAt = null;
                document.getElementById('chatMessages').innerHTML = '';
                const trigger = document.createElement('div');
                trigger.className = 'load-more-trigger';
                trigger.id = 'loadMoreTrigger';
                trigger.textContent = '⬆ 点击加载更早消息';
                trigger.onclick = loadMoreMessages;
                document.getElementById('chatMessages').appendChild(trigger);
            }

            const trigger = document.getElementById('loadMoreTrigger');
            if (trigger && reset) {
                trigger.innerHTML = '<span class="loader"></span> <span class="loading-text">加载中...</span>';
                trigger.className = 'load-more-trigger loading';
            }

            try {
                let query = db.from('messages')
                    .select('*')
                    .eq('room', room)
                    .order('created_at', { ascending: true })
                    .limit(PAGE_SIZE);

                const searchKeyword = document.getElementById('searchInput').value.trim();
                if (searchKeyword) {
                    const { data } = await query;
                    if (data) {
                        const filtered = data.filter(m => m.content.toLowerCase().includes(searchKeyword.toLowerCase()));
                        if (filtered.length > 0) {
                            renderMessages(filtered);
                        } else {
                            document.getElementById('chatMessages').innerHTML = '<div class="text-muted text-center" style="padding:40px 0;">🔍 没有找到包含 "' + escapeHtml(searchKeyword) + '" 的消息</div>';
                        }
                        if (trigger) {
                            trigger.textContent = '—— 已加载全部消息 ——';
                            trigger.className = 'load-more-trigger';
                            trigger.style.display = 'block';
                        }
                        return;
                    }
                }

                const { data, error } = await query;
                if (error) { console.error('加载消息失败', error); return; }
                if (data && data.length > 0) {
                    renderMessages(data);
                    if (data.length > 0) {
                        oldestMessageCreatedAt = data[0].created_at;
                    }
                }

                if (data.length < PAGE_SIZE) {
                    hasMoreMessages = false;
                    if (trigger) {
                        trigger.textContent = '—— 已加载全部消息 ——';
                        trigger.className = 'load-more-trigger';
                        trigger.style.display = 'block';
                    }
                } else {
                    const { data: earlierCheck } = await db.from('messages')
                        .select('id')
                        .eq('room', room)
                        .lt('created_at', oldestMessageCreatedAt || new Date().toISOString())
                        .limit(1);
                    if (earlierCheck && earlierCheck.length > 0) {
                        hasMoreMessages = true;
                        if (trigger) {
                            trigger.style.display = 'block';
                            trigger.textContent = '⬆ 点击加载更早消息';
                            trigger.className = 'load-more-trigger';
                        }
                    } else {
                        hasMoreMessages = false;
                        if (trigger) {
                            trigger.textContent = '—— 已加载全部消息 ——';
                            trigger.className = 'load-more-trigger';
                            trigger.style.display = 'block';
                        }
                    }
                }
                document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
            } catch(e) { console.error('加载消息异常', e); }
        }

        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');
            const trigger = document.getElementById('loadMoreTrigger');
            messages.forEach(msg => {
                const div = document.createElement('div');
                renderMessageToElement(div, msg);
                container.insertBefore(div, trigger);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderMessageToElement(div, msg) {
            const isSelf = msg.username === currentUser.username;
            const isSystem = msg.username === '🛡️ 系统';

            if (isSystem) {
                div.className = 'msg system-msg';
            } else {
                div.className = 'msg ' + (isSelf ? 'self' : 'other');
            }

            const avatarUrl = getAvatarUrl(msg.username, msg.avatar);
            let contentHtml = '';
            if (msg.type === 'image') {
                contentHtml = `<img src="${escapeHtml(msg.content)}" class="msg-img" onclick="window.open('${escapeHtml(msg.content)}','_blank')" />`;
            } else if (msg.type === 'file') {
                if (isValidUrl(msg.content)) {
                    contentHtml = `<div>📄 <a href="${escapeHtml(msg.content)}" target="_blank" class="link-safe">查看文件</a></div>`;
                } else {
                    contentHtml = `<div>📄 文件链接无效</div>`;
                }
            } else {
                contentHtml = `<div class="msg-text">${safeLinkify(msg.content)}</div>`;
            }

            const timeStr = msg.created_at ? formatTime(msg.created_at) : '';
            const fullDateStr = msg.created_at ? formatFullTime(msg.created_at) : '';

            div.innerHTML = `
                <img class="avatar" src="${avatarUrl}" data-action="profile" data-username="${escapeHtml(msg.username)}" />
                <div class="msg-content">
                  <div class="msg-username">${escapeHtml(msg.username)}</div>
                  ${contentHtml}
                  <div class="msg-time">
                    ${timeStr}
                    <span class="full-date">${fullDateStr}</span>
                  </div>
                </div>
                ${!isSystem ? `
                  <div class="msg-actions">
                    <button class="report-btn" data-msgid="${msg.id}" data-username="${escapeHtml(msg.username)}">🚩</button>
                    ${isSelf ? `<button class="delete-btn" data-msgid="${msg.id}">✕</button>` : ''}
                  </div>
                ` : ''}
              `;
        }

        // 事件委托
        document.getElementById('chatMessages').addEventListener('click', async function(e) {
            const target = e.target;

            if (target.classList.contains('report-btn')) {
                const msgId = target.dataset.msgid;
                const username = target.dataset.username;
                if (msgId && username) {
                    const reason = prompt('举报原因（选填）：');
                    if (reason !== null) {
                        try {
                            await db.from('reports').insert({
                                message_id: msgId,
                                reported_user: username,
                                reporter: currentUser.username,
                                reason: reason || '未填写',
                                created_at: new Date().toISOString()
                            });
                            alert('✅ 举报已提交，管理员会尽快处理。');
                        } catch(err) {
                            alert('举报提交失败：' + err.message);
                        }
                    }
                }
                return;
            }

            if (target.classList.contains('delete-btn')) {
                const msgId = target.dataset.msgid;
                if (msgId && confirm('确认删除这条消息？')) {
                    try {
                        await db.from('messages').delete().eq('id', msgId);
                        const msgEl = target.closest('.msg');
                        if (msgEl) msgEl.remove();
                    } catch(e) { alert('删除失败: ' + e.message); }
                }
                return;
            }

            if (target.classList.contains('avatar') && target.dataset.action === 'profile') {
                const username = target.dataset.username;
                if (username) showProfile(username);

            }
        });

        // 核心修复：新消息直接追加到容器末尾
        function renderMessage(msg) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            renderMessageToElement(div, msg);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function loadMoreMessages() {
            if (isLoadingMore || !hasMoreMessages) return;
            isLoadingMore = true;
            const trigger = document.getElementById('loadMoreTrigger');
            trigger.innerHTML = '<span class="loader"></span> <span class="loading-text">加载中...</span>';
            trigger.className = 'load-more-trigger loading';

            try {
                let query = db.from('messages')
                    .select('*')
                    .eq('room', currentRoom)
                    .order('created_at', { ascending: false })
                    .limit(PAGE_SIZE);

                if (oldestMessageCreatedAt) {
                    query = query.lt('created_at', oldestMessageCreatedAt);
                }

                const { data, error } = await query;
                if (error) {
                    console.error('加载更早消息失败', error);
                    isLoadingMore = false;
                    trigger.textContent = '⬆ 加载失败，点击重试';
                    trigger.className = 'load-more-trigger';
                    return;
                }

                if (data && data.length > 0) {
                    const sorted = data.reverse();
                    oldestMessageCreatedAt = sorted[0].created_at;
                    const container = document.getElementById('chatMessages');
                    const triggerEl = document.getElementById('loadMoreTrigger');
                    sorted.forEach(msg => {
                        const div = document.createElement('div');
                        renderMessageToElement(div, msg);
                        container.insertBefore(div, triggerEl);
                    });
                    if (data.length < PAGE_SIZE) {
                        hasMoreMessages = false;
                        trigger.textContent = '—— 已加载全部消息 ——';
                        trigger.className = 'load-more-trigger';
                        trigger.style.display = 'block';
                    } else {
                        trigger.textContent = '⬆ 点击加载更早消息';
                        trigger.className = 'load-more-trigger';
                    }
                } else {
                    hasMoreMessages = false;
                    trigger.textContent = '—— 已加载全部消息 ——';
                    trigger.className = 'load-more-trigger';
                    trigger.style.display = 'block';
                }
            } catch(e) {
                console.error('加载更早消息异常', e);
                trigger.textContent = '⬆ 加载失败，点击重试';
                trigger.className = 'load-more-trigger';
            }
            isLoadingMore = false;
        }

        function subscribeToMessages() {
            wsChannels = wsChannels.filter(ch => {
                if (ch.topic && ch.topic.includes('public:messages')) {
                    try { db.removeChannel(ch); } catch(_) {}
                    return false;
                }
                return true;
            });

            const ch = db.channel('public:messages-' + currentRoom)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: 'room=eq.' + currentRoom
                }, payload => {
                    const msg = payload.new;
                    if (msg.room === currentRoom) {
                        renderMessage(msg);
                        if (msg.username !== currentUser.username) playSound();
                    }
                    if (msg.room && !currentRoomList.includes(msg.room)) {
                        currentRoomList.push(msg.room);
                        loadRooms();
                    }
                })
                .subscribe();
            wsChannels.push(ch);
        }

        // ============================================================
        // 发送消息
        // ============================================================
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentUser.username) return;

            try {
                const { data: userData } = await db.from('users')
                    .select('is_banned')
                    .eq('username', currentUser.username)
                    .single();
                if (userData && userData.is_banned) {
                    alert('⛔ 你已被封禁，无法发送消息');
                    logout();
                    return;
                }
            } catch(_) {
                alert('⛔ 网络异常，请稍后再试');
                return;
            }

            if (containsBlockedText(text)) {
                alert('⚠️ 消息包含违规内容，无法发送。');
                return;
            }

            if (text.length > 10000) {
                alert('⚠️ 消息过长，请控制在10000字符以内');
                return;
            }

            if (text.startsWith('@ai ')) {
                const prompt = text.slice(4);
                input.value = '';
                const userMsg = {
                    username: currentUser.username,
                    content: '@ai ' + prompt,
                    type: 'text',
                    avatar: currentUser.avatar,
                    created_at: new Date().toISOString()
                };
                renderMessage(userMsg);
                const reply = await askAI(prompt, '');
                const aiMsg = {
                    username: '🤖 AI助手',
                    content: reply,
                    type: 'text',
                    avatar: '',
                    created_at: new Date().toISOString()
                };
                renderMessage(aiMsg);
                document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
                input.focus();
                return;
            }

            try {
                const { error } = await db.from('messages').insert({
                    room: currentRoom,
                    username: currentUser.username,
                    content: text,
                    type: 'text',
                    avatar: currentUser.avatar || '',
                    room_owner: currentRoom !== '大厅' ? roomOwners[currentRoom] || currentUser.username : null
                });
                if (error) throw error;
                input.value = '';
                input.focus();
            } catch(err) { alert('发送失败：' + err.message); }
        }

        async function askAI(prompt, context) {
            const truncatedContext = context ? context.substring(0,200) : '';
            const fullMsg = `你是星迹聊天室里的智能助手。请用简洁、友好的中文回答。\n聊天记录：${truncatedContext}\n用户：${prompt}`;
            const url = 'https://text.pollinations.ai/' + encodeURIComponent(fullMsg) + '?model=openai';
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 15000);
            try {
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(timeout);
                const text = await res.text();
                return text || '（AI 暂时没有回复，再问一次吧 ✨）';
            } catch(_) { clearTimeout(timeout); return '🌙 AI 暂时无法回复，请稍后再试。'; }
        }

        // ============================================================
        // 搜索
        // ============================================================
        function searchMessages() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!keyword) return;
            loadMessages(currentRoom, true);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('chatMessages').innerHTML = '';
            currentPage = 0;
            hasMoreMessages = true;
            oldestMessageCreatedAt = null;
            const trigger = document.createElement('div');
            trigger.className = 'load-more-trigger';
            trigger.id = 'loadMoreTrigger';
            trigger.textContent = '⬆ 点击加载更早消息';
            trigger.onclick = loadMoreMessages;
            document.getElementById('chatMessages').appendChild(trigger);
            loadMessages(currentRoom, true);
        }

        // ============================================================
        // 文件上传
        // ============================================================
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 20*1024*1024) { alert('文件过大，请选择小于 20MB 的文件'); e.target.value=''; return; }
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result;
                const type = file.type.startsWith('image/') ? 'image' : 'file';
                if (type === 'image') {
                    const isNsfw = await isImageNSFW(base64);
                    if (isNsfw) {
                        alert('🛡️ 图片审核未通过，可能包含不适宜内容。');
                        return;
                    }
                }
                try {
                    await db.from('messages').insert({
                        room: currentRoom,
                        username: currentUser.username,
                        content: base64,
                        type: type,
                        avatar: currentUser.avatar || '',
                        room_owner: currentRoom !== '大厅' ? roomOwners[currentRoom] || currentUser.username : null
                    });
                    document.getElementById('messageInput').focus();
                } catch(err) { alert('文件上传失败：' + err.message); }
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        function uploadAvatar() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.style.display = 'none';
            document.body.appendChild(input);
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 2*1024*1024) { alert('头像图片请小于 2MB'); return; }
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const base64 = ev.target.result;
                    const isNsfw = await isImageNSFW(base64);
                    if (isNsfw) { alert('🛡️ 头像审核未通过，请更换图片。'); return; }
                    currentUser.avatar = base64;
                    await db.from('users').update({ avatar: currentUser.avatar }).eq('username', currentUser.username);
                    document.getElementById('myAvatar').src = base64;
                    document.getElementById('sigAvatarPreview').src = base64;
                    updateMemberList();
                    input.remove();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // ============================================================
        // 成员列表
        // ============================================================
        async function updateMemberList() {
            const oneHourAgo = new Date(Date.now() - 60*60*1000).toISOString();
            const { data } = await db.from('messages')
                .select('username, avatar')
                .eq('room', currentRoom)
                .gte('created_at', oneHourAgo)
                .order('created_at', { ascending: false })
                .limit(50);
            const members = new Map();
            if (data) { data.forEach(m => { if (!members.has(m.username)) members.set(m.username, m.avatar||''); }); }
            if (!members.has(currentUser.username)) members.set(currentUser.username, currentUser.avatar||'');

            const list = document.getElementById('memberList');
            list.innerHTML = '';
            members.forEach((avatar, username) => {
                const tag = document.createElement('span');
                tag.className = 'member-tag';
                tag.innerHTML = `<img class="avatar avatar-sm" src="${getAvatarUrl(username, avatar)}" /> ${escapeHtml(username)} <span class="online-dot"></span>`;
                tag.title = '双击私聊 ' + username;
                tag.ondblclick = () => { if (username !== currentUser.username) openPrivateChat(username); };
                list.appendChild(tag);
            });
        }

        // ============================================================
        // 个人资料
        // ============================================================
        async function showProfile(username) {
            const { data } = await db.from('users').select('*').eq('username', username).single();
            if (data) {
                const isBanned = data.is_banned || false;
                const isUserAdmin = data.role === 'admin';
                const { data: recentMsgs } = await db.from('messages')
                    .select('content, created_at')
                    .eq('username', username)
                    .order('created_at', { ascending: false })
                    .limit(5);
                let recentHtml = '';
                if (recentMsgs && recentMsgs.length > 0) {
                    recentHtml = recentMsgs.map(m => `<div style="font-size:0.8rem;color:var(--text-secondary);padding:2px 0;">${escapeHtml(m.content).substring(0,40)} <span style="font-size:0.6rem;color:var(--text-muted);">${formatTime(m.created_at)}</span></div>`).join('');
                }
                document.getElementById('profileContent').querySelector('.modal-body').innerHTML = `
                    <div class="text-center">
                      <img src="${getAvatarUrl(username, data.avatar)}" class="avatar avatar-lg" style="margin:0 auto 12px;display:block;" />
                      <h3>${escapeHtml(username)} ${isBanned ? '<span style="background:#e74c3c;color:#fff;font-size:0.6rem;padding:2px 8px;border-radius:999px;margin-left:6px;">已封禁</span>' : ''} ${isUserAdmin ? '<span style="background:#6C5CE7;color:#fff;font-size:0.6rem;padding:2px 8px;border-radius:999px;margin-left:6px;">管理员</span>' : ''}</h3>
                      <p class="text-secondary">${escapeHtml(data.signature || '这个人很懒，什么都没写～')}</p>
                      <div style="font-size:0.8rem;color:var(--text-muted);margin-top:8px;">
                        <div>📱 最后登录: ${data.last_login_at ? formatFullTime(data.last_login_at) : '未知'}</div>
                        <div>📟 设备: ${escapeHtml(data.last_device || '未知')}</div>
                      </div>
                      ${recentHtml ? `<div style="margin-top:12px;text-align:left;"><strong style="font-size:0.8rem;color:var(--text-secondary);">最近消息:</strong>${recentHtml}</div>` : ''}
                      <button class="btn btn-secondary" onclick="closeModal('profileModal')" style="margin-top:16px;">关闭</button>
                    </div>`;
                openModal('profileModal');
            }
        }

        // ============================================================
        // 私聊
        // ============================================================
        function openPrivateChat(target) {
            if (target === currentUser.username) return;
            privateTarget = target;

            wsChannels = wsChannels.filter(ch => {
                const chName = ch.topic || ch.channelName || '';
                if (chName.includes('private_messages')) {
                    try { db.removeChannel(ch); } catch(_) {}
                    return false;
                }
                return true;
            });

            document.getElementById('privateChatTitle').textContent = '💬 私聊 · ' + target;
            document.getElementById('privateChatMessages').innerHTML = '';
            loadPrivateMessages(target);
            subscribePrivateMessages();
            openModal('privateChatModal');
            setTimeout(() => document.getElementById('privateChatInput').focus(), 300);
        }

        async function loadPrivateMessages(target) {
            const { data } = await db.from('private_messages').select('*').or(`sender.eq.${currentUser.username},receiver.eq.${currentUser.username}`).order('created_at', { ascending: true });
            if (data) {
                const box = document.getElementById('privateChatMessages');
                box.innerHTML = '';
                data.filter(m => (m.sender === currentUser.username && m.receiver === target) || (m.sender === target && m.receiver === currentUser.username)).forEach(m => appendPrivateMessage(m, m.sender === currentUser.username));
                box.scrollTop = box.scrollHeight;
            }
        }

        function subscribePrivateMessages() {
            const ch = db.channel('private_messages-' + currentUser.username + '-' + privateTarget)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'private_messages',
                    filter: `sender=eq.${currentUser.username},receiver=eq.${privateTarget}`
                }, payload => {
                    const msg = payload.new;
                    if ((msg.sender === currentUser.username && msg.receiver === privateTarget) || (msg.sender === privateTarget && msg.receiver === currentUser.username)) {
                        appendPrivateMessage(msg, msg.sender === currentUser.username);
                        const box = document.getElementById('privateChatMessages');
                        if (box) box.scrollTop = box.scrollHeight;
                        if (msg.sender !== currentUser.username) playSound();
                    }
                })
                .subscribe();
            wsChannels.push(ch);
        }

        async function sendPrivateMessage() {
            const input = document.getElementById('privateChatInput');
            const text = input.value.trim();
            if (!text || !privateTarget) return;
            if (containsBlockedText(text)) { alert('⚠️ 消息包含违规内容，无法发送。'); return; }
            try {
                await db.from('private_messages').insert({ sender: currentUser.username, receiver: privateTarget, content: text });
                input.value = '';
                input.focus();
            } catch(err) { alert('私聊发送失败：' + err.message); }
        }

        function appendPrivateMessage(msg, isSelf) {
            const box = document.getElementById('privateChatMessages');
            if (!box) return;
            const div = document.createElement('div');
            div.className = 'msg ' + (isSelf ? 'self' : 'other');
            div.style.maxWidth = '85%';
            const timeStr = msg.created_at ? formatTime(msg.created_at) : '';
            const fullDateStr = msg.created_at ? formatFullTime(msg.created_at) : '';
            div.innerHTML = `
                <img class="avatar avatar-sm" src="${getAvatarUrl(msg.sender, '')}" />
                <div class="msg-content">
                  ${!isSelf ? `<div class="msg-username">${escapeHtml(msg.sender)}</div>` : ''}
                  <div class="msg-text">${escapeHtml(msg.content)}</div>
                  <div class="msg-time">
                    ${timeStr}
                    <span class="full-date">${fullDateStr}</span>
                  </div>
                </div>`;
            box.appendChild(div);
        }

        // ============================================================
        // 表情面板
        // ============================================================
        function toggleEmojiPanel() {
            const panel = document.getElementById('emojiPanel');
            if (panel.style.display === 'block') { panel.style.display = 'none'; } else {
                panel.style.display = 'block';
                document.getElementById('emojiGrid').innerHTML = emojis.map(e => `<span onclick="insertEmoji('${e}')">${e}</span>`).join('');
            }
        }

        function insertEmoji(emoji) {
            const privateModal = document.getElementById('privateChatModal');
            const isPrivateOpen = privateModal.classList.contains('active') && privateModal.style.display !== 'none';
            if (isPrivateOpen) {
                const privateInput = document.getElementById('privateChatInput');
                privateInput.value += emoji;
                privateInput.focus();
            } else {
                const mainInput = document.getElementById('messageInput');
                mainInput.value += emoji;
                mainInput.focus();
            }
        }

        // ============================================================
        // 视频通话
        // ============================================================
        async function startCall() {
            const target = prompt('📞 输入对方用户名：');
            if (!target || target === currentUser.username) return;
            callTarget = target;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('videoCallModal').classList.add('active');
                document.getElementById('videoCallModal').style.display = 'flex';
                pc = new RTCPeerConnection();
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                pc.ontrack = (e) => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
                pc.onicecandidate = (e) => { if (e.candidate) db.from('calls').insert({ sender: currentUser.username, receiver: target, type: 'ice', data: e.candidate }); };
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                db.from('calls').insert({ sender: currentUser.username, receiver: target, type: 'offer', data: offer });
            } catch(_) { alert('无法访问摄像头/麦克风，请检查权限设置。'); }
        }

        function subscribeCalls() {
            const ch = db.channel('public:calls-' + currentUser.username)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'calls',
                    filter: 'receiver=eq.' + currentUser.username
                }, async payload => {
                    const msg = payload.new;
                    if (msg.receiver !== currentUser.username) return;
                    try {
                        if (msg.type === 'offer') {
                            if (!confirm('📞 ' + msg.sender + ' 邀请你视频通话，是否接听？')) {
                                db.from('calls').insert({ sender: currentUser.username, receiver: msg.sender, type: 'hangup', data: {} });
                                return;
                            }
                            pc = new RTCPeerConnection();
                            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                            document.getElementById('localVideo').srcObject = localStream;
                            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                            pc.ontrack = (e) => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
                            pc.onicecandidate = (e) => { if (e.candidate) db.from('calls').insert({ sender: currentUser.username, receiver: msg.sender, type: 'ice', data: e.candidate }); };
                            await pc.setRemoteDescription(new RTCSessionDescription(msg.data));
                            const answer = await pc.createAnswer();
                            await pc.setLocalDescription(answer);
                            db.from('calls').insert({ sender: currentUser.username, receiver: msg.sender, type: 'answer', data: answer });
                            document.getElementById('videoCallModal').classList.add('active');
                            document.getElementById('videoCallModal').style.display = 'flex';
                            callTarget = msg.sender;
                        } else if (msg.type === 'answer') { if (pc) await pc.setRemoteDescription(new RTCSessionDescription(msg.data)); }
                        else if (msg.type === 'ice') { if (pc) await pc.addIceCandidate(new RTCIceCandidate(msg.data)); }
                        else if (msg.type === 'hangup') { alert(msg.sender + ' 已挂断通话'); hangUp(); }
                    } catch(e) { console.warn('Call error:', e); }
                })
                .subscribe();
            wsChannels.push(ch);
        }

        function hangUp() {
            if (callTarget) db.from('calls').insert({ sender: currentUser.username, receiver: callTarget, type: 'hangup', data: {} });
            if (pc) { pc.close(); pc = null; }
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            const remoteVideo = document.getElementById('remoteVideo');
            const localVideo = document.getElementById('localVideo');
            if (remoteVideo) remoteVideo.srcObject = null;
            if (localVideo) localVideo.srcObject = null;
            document.getElementById('videoCallModal').classList.remove('active');
            document.getElementById('videoCallModal').style.display = 'none';
            callTarget = '';
        }

        // ============================================================
        // 主题 / 声音
        // ============================================================
        function toggleTheme() {
            document.body.classList.toggle('light');
            try { localStorage.setItem('starry_theme', document.body.classList.contains('light') ? 'light' : 'dark'); } catch(_) {}
        }

        function toggleSound() { soundEnabled = !soundEnabled; document.getElementById('soundToggle').textContent = soundEnabled ? '🔔' : '🔕'; }

        try {
            const savedTheme = localStorage.getItem('starry_theme');
            if (savedTheme === 'light') document.body.classList.add('light');
        } catch(_) {}

        // ============================================================
        // 键盘事件 + 历史路由
        // ============================================================
        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.isComposing && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        document.getElementById('privateChatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.isComposing) {
                e.preventDefault();
                sendPrivateMessage();
            }
        });
        document.querySelectorAll('.modal-overlay').forEach(overlay => { overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.classList.remove('active'); overlay.style.display = 'none'; } }); });

        window.addEventListener('popstate', function(event) {
            const room = event.state?.room;
            if (room && room !== currentRoom) {
                if (room === '大厅') {
                    switchRoom('大厅');
                } else {
                    db.from('messages').select('room').eq('room', room).limit(1).then(({ data }) => {
                        if (data && data.length > 0) {
                            switchRoom(room);
                        } else {
                            const basePath = window.location.pathname.replace(/\/[^\/]*$/, '');
                            window.history.pushState({ room: '大厅' }, '', window.location.origin + basePath + '/');
                            switchRoom('大厅');
                        }
                    });
                }
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            autoLogin();
        });
    </script>
</body>
