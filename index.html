<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星迹 StarryChat</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%2307c160'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='white'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uuid@9.0.0/dist/umd/uuid.min.js"></script>
<style>
  :root {
    --bg: #0f111a;
    --surface: #1a1d2e;
    --surface-light: #232738;
    --text: #d1d5db;
    --text-secondary: #9ca3af;
    --accent: #07c160;
    --accent-hover: #06ad56;
    --border: #2a2e3f;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --radius: 16px;
  }
  body.light {
    --bg: #f3f4f6;
    --surface: #ffffff;
    --surface-light: #f9fafb;
    --text: #1f2937;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 8px 32px rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }
  /* 通用卡片 */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
  }
  /* 输入框 */
  .input-field {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface-light);
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  .input-field:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(7,193,96,0.1);
  }
  /* 按钮 */
  .btn {
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(7,193,96,0.3); }
  .btn-secondary {
    background: var(--surface-light);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }

  /* 欢迎页 */
  #welcomePage {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: var(--bg);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 1000;
  }
  .welcome-card {
    text-align: center;
    max-width: 440px;
    width: 90%;
  }
  .typewriter {
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--accent);
    min-height: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .typewriter-text {
    border-right: 2px solid var(--accent);
    white-space: nowrap;
    overflow: hidden;
    animation: blink 0.8s infinite;
  }
  @keyframes blink { 0%,100% { border-color: transparent; } 50% { border-color: var(--accent); } }
  .welcome-emoji {
    font-size: 3.5rem;
    margin: 24px 0;
    animation: bounce 2s infinite;
  }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .welcome-btns { display: flex; gap: 16px; margin-top: 32px; }

  /* 登录/注册 */
  #authPage {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: var(--bg);
    display: none; justify-content: center; align-items: center;
    z-index: 999;
  }
  .auth-box {
    width: 380px;
    max-width: 90%;
  }
  .auth-box h2 { text-align: center; margin-bottom: 24px; font-size: 1.5rem; }
  .auth-box .switch { text-align: center; margin-top: 16px; color: var(--text-secondary); cursor: pointer; }
  .auth-box .switch:hover { color: var(--accent); }
  .auth-box .error { color: #ef4444; text-align: center; margin-top: 8px; font-size: 0.85rem; }
  .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; }

  /* 个性化 */
  #signaturePage {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: var(--bg);
    display: none; justify-content: center; align-items: center;
    z-index: 1001;
  }
  .signature-box {
    width: 400px;
    max-width: 90%;
    text-align: center;
  }
  .signature-box textarea {
    width: 100%;
    height: 80px;
    resize: none;
    margin: 16px 0;
  }

  /* 聊天主界面 */
  #chatApp { display:none; width:100%; height:100%; flex-direction:column; }
  .top-bar { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--border); }
  .top-bar span { color:var(--text); font-size:1.3rem; font-weight:600; }
  .main-area { display:flex; flex:1; overflow:hidden; }
  .sidebar { width:260px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; transition: left 0.3s; }
  .room-list { flex:1; overflow-y:auto; padding:12px; }
  .room-item { padding:12px 16px; border-radius:12px; margin-bottom:4px; cursor:pointer; color:var(--text); transition: background 0.2s; }
  .room-item.active, .room-item:hover { background:var(--surface-light); }
  .create-room-btn { margin:12px; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:12px; cursor:pointer; font-weight:bold; }
  .chat-area { flex:1; display:flex; flex-direction:column; background:var(--bg); }
  .chat-header { padding:15px 20px; border-bottom:1px solid var(--border); color:var(--text); font-size:1.1rem; display:flex; align-items:center; }
  #chatMessages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
  .msg { display:flex; align-items:flex-start; gap:10px; padding:12px 16px; border-radius:16px; max-width:75%; word-break:break-word; animation:msgIn 0.2s; position:relative; }
  .msg.self { align-self:flex-end; background:var(--accent); color:#fff; }
  .msg.other { align-self:flex-start; background:var(--surface); border:1px solid var(--border); }
  .avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; flex-shrink:0; cursor:pointer; border:2px solid var(--border); }
  .msg-content { flex:1; }
  .msg-time { font-size:0.65rem; color:var(--text-secondary); margin-top:3px; }
  .msg .recall-btn { position:absolute; top:4px; right:8px; background:rgba(0,0,0,0.5); border:none; color:#fff; cursor:pointer; font-size:11px; padding:2px 8px; border-radius:10px; display:none; }
  .msg:hover .recall-btn { display:block; }
  .input-area { display:flex; align-items:center; padding:15px 20px; border-top:1px solid var(--border); gap:12px; background:var(--surface); }
  .input-area input[type="text"] { flex:1; background:var(--surface-light); border:1px solid var(--border); border-radius:24px; padding:12px 20px; color:var(--text); outline:none; }
  .input-area input[type="text"]:focus { border-color:var(--accent); }
  .send-btn { background:var(--accent); border:none; color:#fff; border-radius:50%; width:40px; height:40px; font-size:1.3rem; cursor:pointer; transition: background 0.2s; }
  .send-btn:hover { background:var(--accent-hover); }
  .icon-btn { background:none; border:none; color:var(--text-secondary); font-size:1.4rem; cursor:pointer; padding:8px; border-radius:50%; transition: background 0.2s; }
  .icon-btn:hover { background:var(--surface-light); color:var(--text); }
  #emojiPanel { display:none; padding:10px; background:var(--surface); border-top:1px solid var(--border); }
  #emojiGrid { display:grid; grid-template-columns: repeat(8,1fr); gap:8px; }
  #menuToggle { display:none; position:fixed; top:10px; left:10px; z-index:500; background:var(--accent); border:none; color:#fff; font-size:20px; width:40px; height:40px; border-radius:50%; }
  @media (max-width:768px) {
    #menuToggle { display:block; }
    .sidebar { position:fixed; left:-260px; top:0; height:100%; z-index:400; }
    .sidebar.show { left:0; }
    .chat-area { width:100%; }
    .msg { max-width:90%!important; }
  }
  .search-bar { display:flex; gap:8px; padding:8px 20px; background:var(--surface); align-items:center; }
  .search-bar input { flex:1; padding:8px 12px; border-radius:20px; border:1px solid var(--border); background:var(--surface-light); color:var(--text); }
  #profileModal, #privateChatModal, #signaturePage { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:200; }
  .modal-content { background:var(--surface); padding:30px; border-radius:var(--radius); width:400px; max-height:500px; display:flex; flex-direction:column; color:var(--text); }
</style>
</head>
<body>
<button id="menuToggle" onclick="document.querySelector('.sidebar').classList.toggle('show')">☰</button>

<!-- 欢迎页 -->
<div id="welcomePage">
  <div class="welcome-card card">
    <div class="typewriter">
      <span class="typewriter-text" id="typewriterText"></span>
      <span id="typewriterEmoji" class="welcome-emoji" style="font-size:2.5rem; margin:0;"></span>
    </div>
    <div class="welcome-btns">
      <button class="btn btn-primary" onclick="showSignaturePage()">开始个性化</button>
      <button class="btn btn-secondary" onclick="skipToAuth()">跳过</button>
    </div>
  </div>
</div>

<!-- 个性化 -->
<div id="signaturePage">
  <div class="signature-box card">
    <h2 style="margin-bottom:16px;">设定你的个性签名</h2>
    <textarea class="input-field" id="signatureInput" placeholder="写一句话介绍自己..."></textarea>
    <button class="btn btn-primary" onclick="saveSignatureAndEnter()" style="width:100%;">保存并进入聊天室</button>
  </div>
</div>

<!-- 登录/注册 -->
<div id="authPage">
  <div class="auth-box card" id="loginBox">
    <h2>登录 星迹</h2>
    <input class="input-field" id="loginUser" placeholder="用户名" autocomplete="off" />
    <input class="input-field" id="loginPassword" type="password" placeholder="密码" />
    <label class="remember-row"><input type="checkbox" id="rememberMe" /> 记住我 (7天免登录)</label>
    <button class="btn btn-primary" onclick="login()" style="width:100%;">登录</button>
    <div class="switch" onclick="showRegister()">还没有账号？注册</div>
    <div id="loginError" class="error"></div>
  </div>
  <div class="auth-box card" id="regBox" style="display:none;">
    <h2>注册 星迹</h2>
    <input class="input-field" id="regUsername" placeholder="用户名" />
    <input class="input-field" id="regPassword" type="password" placeholder="密码" />
    <button class="btn btn-primary" onclick="register()" style="width:100%;">注册</button>
    <div class="switch" onclick="showLogin()">已有账号？返回登录</div>
    <div id="regError" class="error"></div>
  </div>
</div>

<!-- 聊天主界面 -->
<div id="chatApp">
  <div class="top-bar">
    <span>✦ 星迹</span>
    <div style="display:flex; align-items:center; gap:8px;">
      <img id="myAvatar" class="avatar" style="width:32px;height:32px;cursor:pointer;" title="点击更换头像" onclick="uploadAvatar()" />
      <button id="soundToggle" class="icon-btn" onclick="toggleSound()" title="新消息提示音">🔔</button>
      <button class="icon-btn" onclick="toggleTheme()" title="切换主题">🌓</button>
      <button class="btn btn-secondary" onclick="logout()" style="padding:6px 14px; font-size:0.85rem;">退出</button>
    </div>
  </div>
  <div class="main-area">
    <div class="sidebar" id="sidebar">
      <div class="room-list" id="roomList"></div>
      <button class="create-room-btn" onclick="showCreateRoom()">+ 创建房间</button>
    </div>
    <div class="chat-area">
      <div class="chat-header" id="chatHeader">🏠 大厅</div>
      <div class="member-list" id="memberList" style="padding:5px 20px; border-bottom:1px solid var(--border); display:flex; gap:10px; flex-wrap:wrap;"></div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索消息关键词" />
        <button class="icon-btn" onclick="searchMessages()">🔍</button>
        <button class="icon-btn" onclick="clearSearch()">✕</button>
      </div>
      <div id="chatMessages"></div>
      <div class="input-area">
        <input type="file" id="fileInput" multiple accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip,.rar,.7z" style="display:none;">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <button class="icon-btn" onclick="toggleEmojiPanel()">😊</button>
        <button class="icon-btn" onclick="startCall()" title="视频通话">📞</button>
        <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off" />
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
      <div id="emojiPanel"><div id="emojiGrid"></div></div>
    </div>
  </div>
</div>

<!-- 视频 -->
<div id="videoCallModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:300; display:none; flex-direction:column; align-items:center; justify-content:center;">
  <video id="localVideo" autoplay muted style="width:80%; max-width:400px; background:#000; border-radius:12px; margin:10px;"></video>
  <video id="remoteVideo" autoplay style="width:80%; max-width:400px; background:#000; border-radius:12px; margin:10px;"></video>
  <div style="margin-top:20px;"><button class="btn btn-secondary" onclick="hangUp()">挂断</button></div>
</div>

<!-- 个人主页 -->
<div id="profileModal"><div class="modal-content" id="profileContent"></div></div>
<!-- 私聊 -->
<div id="privateChatModal"><div class="modal-content" id="privateChatContent"></div></div>

<script>
  const SUPABASE_URL = 'https://nzgnqwcsgnqjffydnxtz.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_igxAfIfC7M4n6SYJKkqQRA_Cj2V0ba9';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = { username: '', avatar: '' };
  let currentRoom = '大厅';
  let soundEnabled = true;
  const emojis = ['😀','😂','😍','😢','😡','👍','👎','🎉','✨','🔥','❤️','💔','😭','🤔','😎','😴','😇','🤣','😱','🥰','🤩','😜','😤','🥺','🧐'];
  let wsChannels = [];

  // ========== 打字机循环 ==========
  const welcomeTexts = ['欢迎来到 StarryChat', '连接每一颗星星', '开启你的聊天之旅'];
  const welcomeEmojis = ['👏','🎉','🥳','🤗','🎊','✨'];
  function runTypeWriter() {
    const textEl = document.getElementById('typewriterText');
    const emojiEl = document.getElementById('typewriterEmoji');
    let textIndex = 0, charIndex = 0;
    const currentText = welcomeTexts[Math.floor(Math.random()*welcomeTexts.length)];
    emojiEl.textContent = welcomeEmojis[Math.floor(Math.random()*welcomeEmojis.length)];
    function type() {
      if (charIndex < currentText.length) {
        textEl.textContent += currentText.charAt(charIndex);
        charIndex++;
        setTimeout(type, 80);
      } else {
        setTimeout(() => {
          textEl.textContent = '';
          charIndex = 0;
          textIndex = (textIndex + 1) % welcomeTexts.length;
          emojiEl.textContent = welcomeEmojis[Math.floor(Math.random()*welcomeEmojis.length)];
          type();
        }, 2000);
      }
    }
    type();
  }

  // ========== 个性化 ==========
  function showSignaturePage() {
    document.getElementById('welcomePage').style.display = 'none';
    document.getElementById('signaturePage').style.display = 'flex';
  }
  async function saveSignatureAndEnter() {
    const sig = document.getElementById('signatureInput').value.trim();
    if (sig && currentUser.username) {
      await db.from('users').update({ signature: sig }).eq('username', currentUser.username);
    }
    document.getElementById('signaturePage').style.display = 'none';
    enterChat();
  }
  function skipToAuth() {
    document.getElementById('welcomePage').style.display = 'none';
    document.getElementById('authPage').style.display = 'flex';
  }

  // ========== 登录/注册（记住我修复） ==========
  function showRegister() { document.getElementById("loginBox").style.display="none"; document.getElementById("regBox").style.display="block"; }
  function showLogin() { document.getElementById("regBox").style.display="none"; document.getElementById("loginBox").style.display="block"; }

  async function login() {
    const u = document.getElementById("loginUser").value.trim();
    const p = document.getElementById("loginPassword").value;
    const remember = document.getElementById("rememberMe").checked;
    if (!u||!p) return;
    const hash = sha256(p);
    const { data, error } = await db.from('users').select('username, avatar').eq('username', u).eq('password_hash', hash).single();
    if (error||!data) { document.getElementById("loginError").innerText="用户名或密码错误"; return; }
    currentUser = { username: data.username, avatar: data.avatar||'' };
    // 记住我逻辑修复
    if (remember) {
      const token = uuid.v4();
      const expires = new Date(Date.now() + 7*24*60*60*1000).toISOString();
      await db.from('users').update({ remember_token: token, remember_expires: expires }).eq('username', u);
      localStorage.setItem('starry_remember', token);
    } else {
      localStorage.removeItem('starry_remember');
    }
    enterChat();
  }

  async function register() {
    const u = document.getElementById("regUsername").value.trim();
    const p = document.getElementById("regPassword").value;
    if (!u||!p) return;
    const hash = sha256(p);
    const { data: existing } = await db.from('users').select('username').eq('username', u).single();
    if (existing) { document.getElementById("regError").innerText="用户名已存在"; return; }
    await db.from('users').insert({ username: u, password_hash: hash, avatar: '', signature: '' });
    alert("注册成功！请登录");
    showLogin();
  }

  function enterChat() {
    document.getElementById("authPage").style.display="none";
    document.getElementById("welcomePage").style.display="none";
    document.getElementById("signaturePage").style.display="none";
    document.getElementById("chatApp").style.display="flex";
    document.getElementById("myAvatar").src = currentUser.avatar || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%234ec9b0%22/%3E%3Ctext x=%2250%22 y=%2270%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22%3E'+currentUser.username[0]+'%3C/text%3E%3C/svg%3E';
    loadRooms(); loadMessages('大厅'); subscribeToMessages(); subscribePrivateMessages(); subscribeCalls();
  }

  async function autoLogin() {
    const savedToken = localStorage.getItem('starry_remember');
    if (savedToken) {
      const { data, error } = await db.from('users').select('username, avatar, remember_expires').eq('remember_token', savedToken).single();
      if (data && !error && new Date(data.remember_expires) > new Date()) {
        currentUser = { username: data.username, avatar: data.avatar||'' };
        enterChat();
        return;
      } else {
        localStorage.removeItem('starry_remember');
      }
    }
    // 没有有效 token，展示欢迎页
    document.getElementById("welcomePage").style.display="flex";
    runTypeWriter();
  }

  function logout() {
    currentUser = { username: '' };
    localStorage.removeItem('starry_remember');
    document.getElementById("chatApp").style.display="none";
    document.getElementById("authPage").style.display="flex";
    wsChannels.forEach(ch => db.removeChannel(ch)); wsChannels=[];
  }

  // ========== 其他功能保持不变（声音、主题、房间、消息、文件、私聊、AI、视频等） ==========
  function sha256(str) { return CryptoJS.SHA256(str).toString(); }
  function playSound() { if (!soundEnabled) return; try { const ctx = new (window.AudioContext||window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value=800; gain.gain.setValueAtTime(0.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1); osc.start(); osc.stop(ctx.currentTime+0.1); } catch(e) {} }
  function toggleSound() { soundEnabled=!soundEnabled; document.getElementById('soundToggle').textContent=soundEnabled?'🔔':'🔕'; }
  function toggleTheme() { document.body.classList.toggle('light'); }
  function loadRooms() { document.getElementById('roomList').innerHTML='<div class="room-item active" onclick="switchRoom(\'大厅\')">🏠 大厅</div>'; }
  function switchRoom(room) { currentRoom=room; document.getElementById("chatHeader").childNodes[0].nodeValue=(room==='大厅'?'🏠 ':'🔒 ')+room+' '; document.getElementById("chatMessages").innerHTML=''; loadMessages(room); document.querySelectorAll('.room-item').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.room-item').forEach(item=>{ if(item.textContent.includes(room)) item.classList.add('active'); }); }
  function showCreateRoom() { const name=prompt("输入房间名："); if(name) { const roomList=document.getElementById('roomList'); const newRoom=document.createElement('div'); newRoom.className='room-item'; newRoom.textContent='🔒 '+name; newRoom.onclick=()=>switchRoom(name); roomList.appendChild(newRoom); switchRoom(name); } }
  function toggleEmojiPanel() { const panel=document.getElementById("emojiPanel"); panel.style.display=panel.style.display==='none'?'block':'none'; if(panel.style.display==='block') document.getElementById("emojiGrid").innerHTML=emojis.map(e=>`<span style="cursor:pointer;font-size:1.5rem;" onclick="insertEmoji('${e}')">${e}</span>`).join(''); }
  function insertEmoji(emoji) { document.getElementById("messageInput").value+=emoji; document.getElementById("messageInput").focus(); }

  async function loadMessages(room) { const { data } = await db.from('messages').select('*').eq('room',room).order('created_at',{ascending:true}).limit(50); if(data){ document.getElementById("chatMessages").innerHTML=''; data.forEach(msg=>renderMessage(msg)); } }
  function subscribeToMessages() { const ch = db.channel('public:messages').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{ const msg=payload.new; if(msg.room===currentRoom){ renderMessage(msg); if(msg.username!==currentUser.username) playSound(); } }).subscribe(); wsChannels.push(ch); }
  function renderMessage(msg) { const div=document.createElement('div'); const isSelf=msg.username===currentUser.username; div.className='msg '+(isSelf?'self':'other'); const avatarHtml=`<img class="avatar" src="${msg.avatar||'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%234ec9b0%22/%3E%3Ctext x=%2250%22 y=%2270%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22%3E'+(msg.username?.[0]||'?')+'%3C/text%3E%3C/svg%3E'}" onclick="showProfile('${msg.username}')" />`; let contentHtml=''; if(!isSelf) contentHtml+=`<div style="font-size:0.75rem;color:var(--text-secondary);">${msg.username}</div>`; if(msg.type==='image') contentHtml+=`<img src="${msg.content}" style="max-width:200px;border-radius:8px;" />`; else contentHtml+=`<div>${msg.content}</div>`; const timeStr=msg.created_at?new Date(msg.created_at).toLocaleTimeString():''; div.innerHTML=avatarHtml+'<div class="msg-content">'+contentHtml+(timeStr?`<div class="msg-time">${timeStr}</div>`:'')+'</div>'; if(isSelf){ const delBtn=document.createElement('button'); delBtn.className='recall-btn'; delBtn.textContent='删除'; delBtn.onclick=async()=>{ if(confirm('删除这条消息？')){ await db.from('messages').delete().eq('id',msg.id); div.remove(); } }; div.appendChild(delBtn); } document.getElementById("chatMessages").appendChild(div); div.scrollIntoView({behavior:'smooth'}); }
  async function sendMessage() { const input=document.getElementById("messageInput"); const text=input.value.trim(); if(!text||!currentUser.username) return; const {error}=await db.from('messages').insert({room:currentRoom,username:currentUser.username,content:text,type:'text',avatar:currentUser.avatar||''}); if(error) alert('发送失败：'+error.message); input.value=''; }
  function searchMessages() { const keyword=document.getElementById("searchInput").value.trim().toLowerCase(); if(!keyword) return; const msgs=document.querySelectorAll('.msg'); msgs.forEach(msg=>{ if(msg.textContent.toLowerCase().includes(keyword)){ msg.style.display='flex'; msg.style.border='2px solid var(--accent)'; } else { msg.style.display='none'; msg.style.border=''; } }); }
  function clearSearch() { document.getElementById("searchInput").value=''; const msgs=document.querySelectorAll('.msg'); msgs.forEach(msg=>{ msg.style.display='flex'; msg.style.border=''; }); }
  document.getElementById("fileInput").addEventListener("change",async(e)=>{ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=async(ev)=>{ const base64=ev.target.result; await db.from('messages').insert({room:currentRoom,username:currentUser.username,content:base64,type:file.type.startsWith('image/')?'image':'file',avatar:currentUser.avatar||''}); }; reader.readAsDataURL(file); e.target.value=''; });
  function uploadAvatar() { const input=document.createElement('input'); input.type='file'; input.accept='image/*'; input.onchange=async(e)=>{ const file=e.target.files[0]; const reader=new FileReader(); reader.onload=async(ev)=>{ currentUser.avatar=ev.target.result; await db.from('users').update({avatar:currentUser.avatar}).eq('username',currentUser.username); document.getElementById('myAvatar').src=currentUser.avatar; alert('头像已更新！'); }; reader.readAsDataURL(file); }; input.click(); }
  async function showProfile(username) { const {data}=await db.from('users').select('avatar,signature').eq('username',username).single(); if(data){ document.getElementById('profileContent').innerHTML=`<h3>${username} 的主页</h3><img src="${data.avatar||''}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;"/><p style="margin-top:10px;">${data.signature||'这个人很懒，什么都没写~'}</p><button class="btn btn-secondary" onclick="document.getElementById(\'profileModal\').style.display=\'none\'">关闭</button>`; document.getElementById('profileModal').style.display='flex'; } }
  let privateTarget=''; function openPrivateChat(target){ wsChannels=wsChannels.filter(ch=>{ if(ch.topic==='realtime:public:private_messages'){ db.removeChannel(ch); return false; } return true; }); privateTarget=target; document.getElementById("privateChatContent").innerHTML=`<h3>私聊 ${target}</h3><div id="privateChatMessages" style="flex:1;overflow-y:auto;padding:10px;margin:10px 0;border-radius:8px;background:var(--bg);max-height:300px;"></div><div style="display:flex;gap:10px;"><input type="text" id="privateChatInput" placeholder="输入私聊消息..." class="input-field" style="margin:0;"/><button class="btn btn-primary" onclick="sendPrivateMessage()">➤</button></div><button class="btn btn-secondary" onclick="document.getElementById(\'privateChatModal\').style.display=\'none\'" style="margin-top:10px;">关闭</button>`; document.getElementById('privateChatModal').style.display='flex'; loadPrivateMessages(target); subscribePrivateMessages(); }
  async function loadPrivateMessages(target){ const {data}=await db.from('private_messages').select('*').or(`sender.eq.${currentUser.username},receiver.eq.${currentUser.username}`).order('created_at',{ascending:true}); if(data){ const box=document.getElementById("privateChatMessages"); if(box){ box.innerHTML=''; data.filter(m=>(m.sender===currentUser.username&&m.receiver===target)||(m.sender===target&&m.receiver===currentUser.username)).forEach(m=>appendPrivateMessage(m,m.sender===currentUser.username)); } } }
  function subscribePrivateMessages(){ const ch=db.channel('public:private_messages').on('postgres_changes',{event:'INSERT',schema:'public',table:'private_messages'},payload=>{ const msg=payload.new; if((msg.sender===currentUser.username&&msg.receiver===privateTarget)||(msg.sender===privateTarget&&msg.receiver===currentUser.username)){ appendPrivateMessage(msg,msg.sender===currentUser.username); } }).subscribe(); wsChannels.push(ch); }
  async function sendPrivateMessage(){ const input=document.getElementById("privateChatInput"); const text=input.value.trim(); if(!text||!privateTarget) return; await db.from('private_messages').insert({sender:currentUser.username,receiver:privateTarget,content:text}); input.value=''; }
  function appendPrivateMessage(msg,isSelf){ const div=document.createElement('div'); div.className='msg '+(isSelf?'self':'other'); div.innerHTML=`<div class="msg-content">${isSelf?'':`<div style="font-size:0.75rem;color:var(--text-secondary);">${msg.sender}</div>`}<div>${msg.content}</div></div>`; const box=document.getElementById("privateChatMessages"); if(box) box.appendChild(div); }
  document.getElementById("memberList").addEventListener("dblclick",(e)=>{ const target=e.target.textContent.trim().replace("👤 ",""); if(target&&target!==currentUser.username) openPrivateChat(target); });
  async function askAI(prompt,context){ const fullMsg=`你是星迹聊天室里的智能助手。请用简洁、友好的中文回答。\n聊天记录：${context}\n用户：${prompt}`; const url='https://text.pollinations.ai/'+encodeURIComponent(fullMsg)+'?model=openai'; try{ const res=await fetch(url); const text=await res.text(); return text||'（AI 暂时无回复）'; } catch(e){ return 'AI 暂时无法回复，请稍后再试。'; } }
  const originalSendMessage=sendMessage; sendMessage=function(){ const input=document.getElementById("messageInput"); const text=input.value.trim(); if(text.startsWith('@ai ')){ const prompt=text.slice(4); const context=''; input.value=''; renderMessage({username:currentUser.username,content:'@ai '+prompt,type:'text',avatar:currentUser.avatar,created_at:new Date()}); askAI(prompt,context).then(reply=>{ renderMessage({username:'AI助手',content:reply,type:'text',avatar:'',created_at:new Date()}); }); return; } originalSendMessage(); };
  let localStream,pc,callTarget; async function startCall(){ const target=prompt('请输入对方用户名：'); if(!target) return; callTarget=target; localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:true}); document.getElementById('localVideo').srcObject=localStream; document.getElementById('videoCallModal').style.display='flex'; pc=new RTCPeerConnection(); localStream.getTracks().forEach(track=>pc.addTrack(track,localStream)); pc.ontrack=(e)=>{ document.getElementById('remoteVideo').srcObject=e.streams[0]; }; pc.onicecandidate=(e)=>{ if(e.candidate) db.from('calls').insert({sender:currentUser.username,receiver:target,type:'ice',data:e.candidate}); }; const offer=await pc.createOffer(); await pc.setLocalDescription(offer); db.from('calls').insert({sender:currentUser.username,receiver:target,type:'offer',data:offer}); }
  function subscribeCalls(){ const ch=db.channel('public:calls').on('postgres_changes',{event:'INSERT',schema:'public',table:'calls'},async payload=>{ const msg=payload.new; if(msg.receiver!==currentUser.username) return; if(msg.type==='offer'){ pc=new RTCPeerConnection(); localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:true}); document.getElementById('localVideo').srcObject=localStream; localStream.getTracks().forEach(track=>pc.addTrack(track,localStream)); pc.ontrack=(e)=>{ document.getElementById('remoteVideo').srcObject=e.streams[0]; }; pc.onicecandidate=(e)=>{ if(e.candidate) db.from('calls').insert({sender:currentUser.username,receiver:msg.sender,type:'ice',data:e.candidate}); }; await pc.setRemoteDescription(new RTCSessionDescription(msg.data)); const answer=await pc.createAnswer(); await pc.setLocalDescription(answer); db.from('calls').insert({sender:currentUser.username,receiver:msg.sender,type:'answer',data:answer}); document.getElementById('videoCallModal').style.display='flex'; callTarget=msg.sender; } else if(msg.type==='answer'){ if(pc) await pc.setRemoteDescription(new RTCSessionDescription(msg.data)); } else if(msg.type==='ice'){ if(pc) await pc.addIceCandidate(new RTCIceCandidate(msg.data)); } }).subscribe(); wsChannels.push(ch); }
  function hangUp(){ if(pc){pc.close();pc=null;} if(localStream){localStream.getTracks().forEach(t=>t.stop());} document.getElementById('videoCallModal').style.display='none'; if(callTarget) db.from('calls').delete().or(`sender.eq.${currentUser.username},receiver.eq.${currentUser.username}`); }
  document.getElementById("messageInput").addEventListener("keypress",(e)=>{ if(e.key==="Enter") sendMessage(); });
  window.onload = () => {
    autoLogin();
  };
</script>
