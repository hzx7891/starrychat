<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>星迹 StarryChat</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236C5CE7'/%3E%3Cstop offset='100%25' stop-color='%2300B894'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='48' fill='url(%23g)'/%3E%3Ctext x='50' y='72' font-size='60' text-anchor='middle' fill='white' font-family='system-ui'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js">
    </script>
    <style>
        /* ===== 全局（含Safari兼容） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #6C5CE7;
            --primary-light: #a29bfe;
            --secondary: #00B894;
            --secondary-light: #55efc4;
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-surface: rgba(255, 255, 255, 0.05);
            --bg-surface-hover: rgba(255, 255, 255, 0.10);
            --bg-card: rgba(255, 255, 255, 0.06);
            --bg-card-hover: rgba(255, 255, 255, 0.10);
            --text-primary: #f0f0f5;
            --text-secondary: #a8a8c8;
            --text-muted: #6a6a8a;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 16px 64px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 60px rgba(108, 92, 231, 0.15);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --radius-full: 9999px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            --sidebar-width: 280px;
            --header-height: 60px;
            --input-height: 64px;
        }
        /* Safari 兼容：@supports 降级 */
        @supports not (backdrop-filter: blur(12px)) {
            .card,
            .top-bar,
            .sidebar,
            .chat-header,
            .member-list,
            .search-bar,
            .input-area,
            #emojiPanel,
            .modal-content {
                background: var(--bg-secondary) !important;
            }
        }
        body.light {
            --bg-primary: #f0f0f5;
            --bg-secondary: #e8e8f0;
            --bg-surface: rgba(255, 255, 255, 0.7);
            --bg-surface-hover: rgba(255, 255, 255, 0.9);
            --bg-card: rgba(255, 255, 255, 0.8);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8a8aaa;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 16px 64px rgba(0, 0, 0, 0.10);
            --shadow-glow: 0 0 60px rgba(108, 92, 231, 0.08);
        }
        html,
        body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: var(--radius-full);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 28px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 0.95rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0);
            transition: background var(--transition);
        }
        .btn:hover::after {
            background: rgba(255, 255, 255, 0.08);
        }
        .btn:active::after {
            background: rgba(255, 255, 255, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.35);
        }
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 32px rgba(108, 92, 231, 0.45);
        }
        .btn-primary:active {
            transform: translateY(0) scale(0.98);
        }
        .btn-secondary {
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .btn-secondary:hover {
            background: var(--bg-surface-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #c0392b;
            transform: scale(1.04);
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 0.7rem;
            border-radius: var(--radius-full);
        }
        .input-field {
            width: 100%;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: var(--font);
            outline: none;
            transition: all var(--transition);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
            background: var(--bg-surface-hover);
        }
        .input-field::placeholder {
            color: var(--text-muted);
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid var(--border-color);
            transition: all var(--transition);
            background: var(--bg-surface);
        }
        .avatar:hover {
            border-color: var(--primary);
            transform: scale(1.05);
        }
        .avatar-sm {
            width: 32px;
            height: 32px;
            border-width: 1.5px;
        }
        .avatar-lg {
            width: 72px;
            height: 72px;
            border-width: 3px;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background: var(--bg-surface);
            color: var(--text-primary);
            transform: scale(1.05);
        }
        .icon-btn:active {
            transform: scale(0.92);
        }
        #welcomePage {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        #welcomePage .card {
            max-width: 500px;
            width: 100%;
            padding: 48px 40px;
            text-align: center;
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            animation: fadeUp 0.8s var(--transition-bounce);
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 12px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }
        .welcome-title {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .welcome-sub {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 32px;
        }
        .typewriter-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 3rem;
            margin-bottom: 12px;
        }
        .typewriter-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            border-right: 2px solid var(--primary);
            padding-right: 4px;
            white-space: nowrap;
            overflow: hidden;
            animation: blink 0.8s step-end infinite;
            max-width: 100%;
        }
        @keyframes blink {
            0%,
            100% {
                border-color: var(--primary);
            }
            50% {
                border-color: transparent;
            }
        }
        .typewriter-emoji {
            font-size: 2rem;
            animation: float 2.5s ease-in-out infinite;
        }
        .welcome-btns {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .welcome-btns .btn {
            min-width: 140px;
        }
        #authPage {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }
        .auth-box {
            width: 400px;
            max-width: 100%;
            padding: 40px 36px;
            animation: fadeUp 0.6s var(--transition-bounce);
        }
        .auth-box h2 {
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-box .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .auth-box .input-field {
            margin-bottom: 14px;
        }
        .auth-box .btn {
            width: 100%;
            margin-top: 4px;
        }
        .auth-box .switch {
            text-align: center;
            margin-top: 18px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: color var(--transition);
        }
        .auth-box .switch:hover {
            color: var(--primary-light);
        }
        .auth-box .error {
            color: var(--accent);
            text-align: center;
            margin-top: 10px;
            font-size: 0.85rem;
            min-height: 1.4rem;
        }
        .remember-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 6px 0 18px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
        }
        .remember-row input[type="checkbox"] {
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        #signaturePage {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            padding: 20px;
        }
        .signature-box {
            width: 420px;
            max-width: 100%;
            padding: 40px 36px;
            text-align: center;
            animation: fadeUp 0.6s var(--transition-bounce);
        }
        .signature-box h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .signature-box p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .signature-box textarea {
            resize: none;
            height: 90px;
            margin-bottom: 20px;
        }
        .signature-box .btn {
            width: 100%;
        }
        .signature-box .avatar-upload {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .signature-box .avatar-upload img {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-color);
            cursor: pointer;
            transition: all var(--transition);
        }
        .signature-box .avatar-upload img:hover {
            border-color: var(--primary);
            transform: scale(1.04);
        }
        #chatApp {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            background: var(--bg-primary);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            height: var(--header-height);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            z-index: 10;
        }
        .top-bar .brand {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }
        .top-bar .brand span {
            background: linear-gradient(135deg, var(--primary-light), var(--secondary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .top-bar .actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform var(--transition);
            z-index: 20;
        }
        .sidebar-header {
            padding: 16px 20px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
        }
        .room-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 12px 12px;
        }
        .room-item {
            padding: 10px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 2px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.92rem;
            font-weight: 500;
            justify-content: space-between;
        }
        .room-item:hover {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
        }
        .room-item.active {
            background: var(--bg-surface);
            color: var(--text-primary);
            box-shadow: inset 3px 0 0 var(--primary);
        }
        .room-item .room-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity var(--transition);
        }
        .room-item:hover .room-actions {
            opacity: 1;
        }
        .room-item .room-actions button {
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: #fff;
            font-size: 0.55rem;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: all 0.2s;
        }
        .room-item .room-actions button:hover {
            background: rgba(231, 76, 60, 0.8);
        }
        .create-room-btn {
            margin: 8px 12px 16px;
            padding: 12px;
            background: var(--bg-surface);
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font);
        }
        .create-room-btn:hover {
            background: var(--bg-surface-hover);
            color: var(--text-primary);
            border-color: var(--primary);
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
        }
        .chat-header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .chat-header .room-name {
            font-size: 1.05rem;
            font-weight: 600;
        }
        .chat-header .room-meta {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-left: auto;
        }
        .member-list {
            padding: 6px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
            min-height: 44px;
            align-items: center;
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .member-list .member-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px 4px 6px;
            border-radius: var(--radius-full);
            background: var(--bg-surface);
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
            border: 1px solid transparent;
        }
        .member-list .member-tag:hover {
            background: var(--bg-surface-hover);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        .member-list .member-tag .avatar {
            width: 24px;
            height: 24px;
            border-width: 1px;
        }
        .member-list .member-tag .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--secondary);
            display: inline-block;
            margin-left: 2px;
        }
        .search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 20px;
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .search-bar input {
            flex: 1;
            padding: 8px 14px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: var(--font);
            outline: none;
            transition: all var(--transition);
        }
        .search-bar input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }
        .search-bar input::placeholder {
            color: var(--text-muted);
        }
        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--bg-primary);
            overscroll-behavior: contain;
        }
        .msg {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 18px;
            border-radius: var(--radius-md);
            max-width: 72%;
            word-break: break-word;
            animation: msgIn 0.25s ease-out;
            position: relative;
            transition: all var(--transition);
        }
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .msg.self {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.other {
            align-self: flex-start;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }
        .msg .avatar {
            width: 36px;
            height: 36px;
            border-width: 2px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .msg .msg-content {
            flex: 1;
            min-width: 0;
        }
        .msg .msg-username {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .msg.self .msg-username {
            color: rgba(255, 255, 255, 0.7);

        function formatTime(ts) {
            if (!ts) return '';
            return new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

        function formatFullTime(ts) {
            if (!ts) return '-';
            return new Date(ts).toLocaleString('zh-CN', { hour12: false });

        const welcomeEmojis = ['👏', '🎉', '🥳', '🤗', '🎊', '✨', '🌟', '💫'];

        function runTypeWriter() {
            const textEl = document.getElementById('typewriterText');
            const emojiEl = document.getElementById('typewriterEmoji');
            let textIndex = 0;
            const currentText = welcomeTexts[0];
            emojiEl.textContent = welcomeEmojis[0];

            function typeWithText(text) {
                let idx = 0;
                textEl.textContent = '';

                function step() {
                    if (idx < text.length) {
                        textEl.textContent += text.charAt(idx);
                        idx++;
                        setTimeout(step, 70 + Math.random() * 30);
                    } else {
                        setTimeout(() => {
                            textIndex = (textIndex + 1) % welcomeTexts.length;
                            emojiEl.textContent = welcomeEmojis[textIndex % welcomeEmojis.length];
                            typeWithText(welcomeTexts[textIndex]);
                        }, 1800);
                    }
                }
                step();
            }
            typeWithText(currentText);
        }

        async function login() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;
            if (!u || !p) { document.getElementById('loginError').innerText = '请填写完整信息'; return; }
            const hash = sha256(p);
            try {
                const { data: userData, error: userError } = await db.from('users')
                    .select('username, avatar, signature, is_banned')
                    .eq('username', u)
                    .single();
                if (userError || !userData) {
                    document.getElementById('loginError').innerText = '用户名或密码错误';
                    return;
                }
                if (userData.is_banned) {
                    document.getElementById('loginError').innerText = '⛔ 该账号已被封禁';
                    return;
                }

                const { data, error } = await db.from('users')
                    .select('username, avatar, signature')
                    .eq('username', u)
                    .eq('password_hash', hash)
                    .single();
                if (error || !data) { document.getElementById('loginError').innerText = '用户名或密码错误'; return; }

                currentUser = { username: data.username, avatar: data.avatar || '', signature: data.signature || '' };
                isAdmin = data.username === 'hzx7891';

                // 记录登录日志
                try {
                    const deviceInfo = navigator.userAgent || '未知设备';
                    await db.from('login_logs').insert({ username: u, device: deviceInfo, created_at: new Date()
                            .toISOString() });
                    await db.from('users').update({ last_login_at: new Date().toISOString(), last_device: deviceInfo })
                        .eq('username', u);
                } catch (logErr) { console.warn('日志记录失败', logErr); }

                if (remember) {
                    try {
                        const token = generateUUID();
                        const expires = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString();
                        await db.from('users').update({ remember_token: token, remember_expires: expires })
                            .eq('username', u);
                        localStorage.setItem('starry_remember', token);
                    } catch (tokenErr) { console.warn('记住我写入失败', tokenErr); }
                } else {
                    localStorage.removeItem('starry_remember');
                }
                // 如果有未完成的签名，先跳转签名页
                if (!currentUser.signature && !currentUser.avatar) {
                    showSignaturePage();
                    return;
                }
                enterChat();
            } catch (err) {
                document.getElementById('loginError').innerText = '网络错误，请重试';
                console.error(err);
            }
        }

        async function register() {
            const u = document.getElementById('regUsername').value.trim();
            const p = document.getElementById('regPassword').value;
            if (!u || !p) { document.getElementById('regError').innerText = '请填写完整信息'; return; }
            if (u.length < 2) { document.getElementById('regError').innerText = '用户名至少2个字符'; return; }
            if (p.length < 4) { document.getElementById('regError').innerText = '密码至少4个字符'; return; }
            const hash = sha256(p);
            try {
                const { data: existing } = await db.from('users').select('username').eq('username', u).single();
                if (existing) { document.getElementById('regError').innerText = '用户名已存在'; return; }
                await db.from('users').insert({
                    username: u,
                    password_hash: hash,
                    avatar: '',
                    signature: '',
                    is_banned: false
                });
                alert('🎉 注册成功！请登录');
                showLogin();
                document.getElementById('loginUser').value = u;
                document.getElementById('loginPassword').value = '';
            } catch (err) {
                document.getElementById('regError').innerText = '注册失败，请重试';
                console.error(err);
            }
        }

        async function autoLogin() {
            const savedToken = localStorage.getItem('starry_remember');
            if (savedToken) {
                try {
                    const { data, error } = await db.from('users')
                        .select('username, avatar, signature, remember_expires, is_banned')
                        .eq('remember_token', savedToken)
                        .single();
                    if (data && !error && new Date(data.remember_expires) > new Date()) {
                        if (data.is_banned) {
                            localStorage.removeItem('starry_remember');
                            alert('⛔ 该账号已被封禁');
                            document.getElementById('welcomePage').style.display = 'flex';
                            runTypeWriter();
                            return;
                        }
                        currentUser = { username: data.username, avatar: data.avatar || '', signature: data.signature ||
                                '' };
                        isAdmin = data.username === 'hzx7891';
                        // 如果有签名但未设置过，跳转签名页
                        if (!currentUser.signature && !currentUser.avatar) {
                            showSignaturePage();
                            return;
                        }
                        enterChat();
                        return;
                    } else {
                        localStorage.removeItem('starry_remember');
                    }
                } catch (_) {
                    localStorage.removeItem('starry_remember');

        // ============================================================
        // 房间（含房主机制 + 删除）
        // ============================================================
        async function loadRooms() {
            const list = document.getElementById('roomList');
            let rooms = ['大厅'];
            const { data } = await db.from('messages').select('room').order('created_at', { ascending: false });
            if (data) {
                const roomSet = new Set();
                data.forEach(m => { if (m.room) roomSet.add(m.room); });
                roomSet.forEach(r => { if (r !== '大厅') rooms.push(r); });
            }
            list.innerHTML = '';
            rooms.forEach(room => {
                const div = document.createElement('div');
                div.className = 'room-item' + (room === currentRoom ? ' active' : '');
                // 检查是否是房主（通过messages表里room_owner字段判断）
                const isOwner = room !== '大厅' && roomOwners[room] === currentUser.username;
                const ownerLabel = isOwner ? ' 👑' : '';
                div.innerHTML = `
                    <span>${room === '大厅' ? '🏠' : '🔒'} ${room}${ownerLabel}</span>
                    ${room !== '大厅' ? `
                        <span class="room-actions">
                            ${isOwner || isAdmin ? `<button onclick="deleteRoom('${room}')" title="删除房间">✕</button>` : ''}
                        </span>
                    ` : ''}
                `;
                div.onclick = (e) => {
                    if (e.target.closest('.room-actions')) return;
                    switchRoom(room);
                };
                list.appendChild(div);
            });
        }

        // 存储房间房主信息（从messages表获取）
        let roomOwners = {};

            const { data } = await db.from('messages').select('room, room_owner').not('room_owner', 'is', null);
            if (data) {

        function switchRoom(room) {
            currentRoom = room;

        async function deleteRoom(room) {
            if (room === '大厅') { alert('不能删除大厅'); return; }
            if (!confirm(`确认删除房间 "${room}" 及其所有消息？`)) return;
            try {
                // 删除该房间所有消息
                await db.from('messages').delete().eq('room', room);
                // 从列表移除
                document.querySelectorAll('.room-item').forEach(el => {
                    if (el.textContent.includes(room)) el.remove();
                });
                // 如果当前在这个房间，切回大厅
                if (currentRoom === room) switchRoom('大厅');
                alert('✅ 房间已删除');
                delete roomOwners[room];
            } catch (e) { alert('删除失败: ' + e.message); }
        }

        // ============================================================
        // 消息系统（分页加载）
        // ============================================================
        async function loadMessages(room, reset = true) {
            if (reset) {
                currentPage = 0;
                hasMoreMessages = true;
                oldestMessageId = null;
                document.getElementById('chatMessages').innerHTML = '';
                // 重新添加加载触发器
                const trigger = document.createElement('div');
                trigger.className = 'load-more-trigger';
                trigger.id = 'loadMoreTrigger';
                trigger.textContent = '⬆ 点击加载更早消息';
                trigger.onclick = loadMoreMessages;
                document.getElementById('chatMessages').appendChild(trigger);
            }

            try {
                let query = db.from('messages')
                    .select('*')
                    .eq('room', room)
                    .order('created_at', { ascending: true })
                    .limit(PAGE_SIZE);

                // 如果有关键字搜索，使用搜索模式
                const searchKeyword = document.getElementById('searchInput').value.trim();
                if (searchKeyword) {
                    // 使用简单的文本过滤，在客户端做
                    const { data } = await query;
                    if (data) {
                        const filtered = data.filter(m => m.content.toLowerCase().includes(searchKeyword.toLowerCase()));
                        if (filtered.length > 0) {
                            renderMessages(filtered);
                        }
                        return;
                    }
                }

                const { data, error } = await query;
                if (error) { console.error('加载消息失败', error); return; }
                if (data && data.length > 0) {
                    renderMessages(data);
                    // 记录最旧消息ID用于加载更多
                    if (data.length > 0) {
                        oldestMessageId = data[0].id;
                    }
                }
                if (data.length < PAGE_SIZE) {
                    hasMoreMessages = false;
                    document.getElementById('loadMoreTrigger').textContent = '—— 已加载全部消息 ——';
                }
                document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
            } catch (e) { console.error('加载消息异常', e); }
        }

        function renderMessages(messages) {
            const container = document.getElementById('chatMessages');
            // 将加载触发器移到最后
            const trigger = document.getElementById('loadMoreTrigger');
            if (trigger) {
                messages.forEach(msg => {
                    const div = document.createElement('div');
                    // 使用现有的renderMessage逻辑
                    renderMessageToElement(div, msg);
                    container.insertBefore(div, trigger);
                });
                // 滚动到最新消息
                container.scrollTop = container.scrollHeight;
            }
        }

        function renderMessageToElement(div, msg) {
            const isSelf = msg.username === currentUser.username;
            const isSystem = msg.username === '🛡️ 系统';

            if (isSystem) {
                div.className = 'msg';
                div.style.alignSelf = 'center';
                div.style.maxWidth = '90%';
                div.style.background = 'rgba(241,196,15,0.15)';
                div.style.border = '1px solid rgba(241,196,15,0.3)';
                div.style.borderRadius = 'var(--radius-full)';
                div.style.padding = '8px 20px';
            } else {
                div.className = 'msg ' + (isSelf ? 'self' : 'other');
            }

            const avatarUrl = getAvatarUrl(msg.username, msg.avatar);
            let contentHtml = '';
            if (msg.type === 'image') {
                contentHtml =
                    `<img src="${escapeHtml(msg.content)}" class="msg-img" onclick="window.open('${escapeHtml(msg.content)}','_blank')" />`;
            } else if (msg.type === 'file') {
                contentHtml =
                    `<div>📄 <a href="${escapeHtml(msg.content)}" target="_blank" style="color:var(--primary-light);">查看文件</a></div>`;
            } else {
                contentHtml = `<div class="msg-text">${escapeHtml(msg.content)}</div>`;
            }

            const timeStr = msg.created_at ? formatTime(msg.created_at) : '';

            div.innerHTML = `
                <img class="avatar" src="${avatarUrl}" onclick="showProfile('${escapeHtml(msg.username)}')" />
                <div class="msg-content">
                  <div class="msg-username">${escapeHtml(msg.username)}</div>
                  ${contentHtml}
                  <div class="msg-time">${timeStr}</div>
                </div>
                ${isSelf ? `<button class="recall-btn" onclick="deleteMessage('${escapeHtml(msg.id)}')">删除</button>` : ''}
              `;
        }

        function renderMessage(msg) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            renderMessageToElement(div, msg);
            // 插入到加载触发器之前
            const trigger = document.getElementById('loadMoreTrigger');
            if (trigger) {
                container.insertBefore(div, trigger);
            } else {
                container.appendChild(div);
            }
            container.scrollTop = container.scrollHeight;
        }

        async function loadMoreMessages() {
            if (isLoadingMore || !hasMoreMessages) return;
            isLoadingMore = true;
            const trigger = document.getElementById('loadMoreTrigger');
            trigger.textContent = '⏳ 加载中...';
            trigger.className = 'load-more-trigger loading';

            try {
                // 基于oldestMessageId加载更早的消息
                let query = db.from('messages')
                    .select('*')
                    .eq('room', currentRoom)
                    .order('created_at', { ascending: false })
                    .limit(PAGE_SIZE);

                if (oldestMessageId) {
                    // 获取比oldestMessageId更早的消息
                    const { data: oldestMsg } = await db.from('messages')
                        .select('created_at')
                        .eq('id', oldestMessageId)
                        .single();
                    if (oldestMsg && oldestMsg.created_at) {
                        query = query.lt('created_at', oldestMsg.created_at);
                    }
                }

                const { data, error } = await query;
                if (error) { console.error('加载更早消息失败', error);
                    isLoadingMore = false;
                    trigger.textContent = '⬆ 加载失败，点击重试';
                    trigger.className = 'load-more-trigger';
                    return; }

                if (data && data.length > 0) {
                    // 反转顺序（因为查询是倒序的）
                    const sorted = data.reverse();
                    // 更新oldestMessageId
                    oldestMessageId = sorted[0].id;
                    // 渲染到顶部
                    const container = document.getElementById('chatMessages');
                    const triggerEl = document.getElementById('loadMoreTrigger');
                    sorted.forEach(msg => {
                        const div = document.createElement('div');
                        renderMessageToElement(div, msg);
                        container.insertBefore(div, triggerEl);
                    });
                    if (data.length < PAGE_SIZE) {
                        hasMoreMessages = false;
                        trigger.textContent = '—— 已加载全部消息 ——';
                        trigger.className = 'load-more-trigger';
                    } else {
                        trigger.textContent = '⬆ 点击加载更早消息';
                        trigger.className = 'load-more-trigger';
                    }
                } else {
                    hasMoreMessages = false;
                    trigger.textContent = '—— 已加载全部消息 ——';
                    trigger.className = 'load-more-trigger';
                }
            } catch (e) {
                console.error('加载更早消息异常', e);
                trigger.textContent = '⬆ 加载失败，点击重试';
                trigger.className = 'load-more-trigger';
            }
            isLoadingMore = false;
        }

        function subscribeToMessages() {
            const ch = db.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public',
                table: 'messages' }, payload => {
                const msg = payload.new;
                if (msg.room === currentRoom) {
                    renderMessage(msg);
                    if (msg.username !== currentUser.username) playSound();
                }
                loadRooms();
            }).subscribe();
            wsChannels.push(ch);
        }

        async function deleteMessage(id) {
            if (!confirm('确认删除这条消息？')) return;
            try {
                await db.from('messages').delete().eq('id', id);
                document.querySelectorAll('.msg').forEach(el => {
                    if (el.querySelector(`[onclick*="deleteMessage('${id}')"]`)) el.remove();
                });
            } catch (e) { alert('删除失败: ' + e.message); }
        }

        // ============================================================
        // 发送消息
        // ============================================================
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentUser.username) return;

            // 检查封禁状态（实时）
            try {
                const { data: userData } = await db.from('users')
                    .select('is_banned')
                    .eq('username', currentUser.username)
                    .single();
                if (userData && userData.is_banned) {
                    alert('⛔ 你已被封禁，无法发送消息');
                    logout();
                    return;
                }
            } catch (_) {}

            if (containsBlockedText(text)) {
                alert('⚠️ 消息包含违规内容，无法发送。');
                return;
            }

            if (text.startsWith('@ai ')) {
                const prompt = text.slice(4);
                input.value = '';
                const userMsg = {
                    username: currentUser.username,
                    content: '@ai ' + prompt,
                    type: 'text',
                    avatar: currentUser.avatar,
                    created_at: new Date().toISOString()
                };
                renderMessage(userMsg);
                const reply = await askAI(prompt, '');
                const aiMsg = {
                    username: '🤖 AI助手',
                    content: reply,
                    type: 'text',
                    avatar: '',
                    created_at: new Date().toISOString()
                };
                renderMessage(aiMsg);
                document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
                return;
            }

            try {
                const { error } = await db.from('messages').insert({
                    room: currentRoom,
                    username: currentUser.username,
                    content: text,
                    type: 'text',
                    avatar: currentUser.avatar || '',
                    room_owner: currentRoom !== '大厅' ? roomOwners[currentRoom] || currentUser.username : null
                });
                if (error) throw error;
                input.value = '';
                input.focus();
            } catch (err) { alert('发送失败：' + err.message); }
        }

        async function askAI(prompt, context) {
            const fullMsg =
                `你是星迹聊天室里的智能助手。请用简洁、友好的中文回答。\n聊天记录：${context}\n用户：${prompt}`;
            const url = 'https://text.pollinations.ai/' + encodeURIComponent(fullMsg) + '?model=openai';
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 15000);
            try {
                const res = await fetch(url, { signal: controller.signal });
                clearTimeout(timeout);
                const text = await res.text();
                return text || '（AI 暂时没有回复，再问一次吧 ✨）';
            } catch (_) { clearTimeout(timeout); return '🌙 AI 暂时无法回复，请稍后再试。'; }
        }

        // ============================================================
        // 搜索
        // ============================================================
        function searchMessages() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!keyword) return;
            // 重新加载当前房间，过滤消息
            loadMessages(currentRoom, true);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            loadMessages(currentRoom, true);
        }

        // ============================================================
        // 举报
        // ============================================================
        async function reportMessage(msgId, reportedUser) {
            const reason = prompt('举报原因（选填）：');
            if (reason === null) return;
            try {
                await db.from('reports').insert({
                    message_id: msgId,
                    reported_user: reportedUser,
                    reporter: currentUser.username,
                    reason: reason || '未填写',
                    created_at: new Date().toISOString()
                });
                alert('✅ 举报已提交，管理员会尽快处理。');
            } catch (err) {
                alert('举报提交失败：' + err.message);
            }
        }

        // ============================================================
        // 文件上传
        // ============================================================
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 20 * 1024 * 1024) { alert('文件过大，请选择小于 20MB 的文件');
                e.target.value = ''; return; }
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result;
                const type = file.type.startsWith('image/') ? 'image' : 'file';
                if (type === 'image') {
                    const isNsfw = await isImageNSFW(base64);
                    if (isNsfw) {
                        alert('🛡️ 图片审核未通过，可能包含不适宜内容。');
                        return;
                    }
                }
                try {
                    await db.from('messages').insert({
                        room: currentRoom,
                        username: currentUser.username,
                        content: base64,
                        type: type,
                        avatar: currentUser.avatar || '',
                        room_owner: currentRoom !== '大厅' ? roomOwners[currentRoom] || currentUser.username : null
                    });
                } catch (err) { alert('文件上传失败：' + err.message); }
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        function uploadAvatar() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 2 * 1024 * 1024) { alert('头像图片请小于 2MB'); return; }
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const base64 = ev.target.result;
                    const isNsfw = await isImageNSFW(base64);
                    if (isNsfw) { alert('🛡️ 头像审核未通过，请更换图片。'); return; }
                    currentUser.avatar = base64;
                    await db.from('users').update({ avatar: currentUser.avatar }).eq('username', currentUser.username);
                    document.getElementById('myAvatar').src = base64;
                    document.getElementById('sigAvatarPreview').src = base64;
                    updateMemberList();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // ============================================================
        // 成员列表
        // ============================================================
        async function updateMemberList() {
            const oneHourAgo = new Date(Date.now() - 60 * 60 * 1000).toISOString();
            const { data } = await db.from('messages').select('username, avatar').eq('room', currentRoom).gte('created_at',
                oneHourAgo).order('created_at', { ascending: false });
            const members = new Map();
            if (data) { data.forEach(m => { if (!members.has(m.username)) members.set(m.username, m.avatar || ''); }); }
            if (!members.has(currentUser.username)) members.set(currentUser.username, currentUser.avatar || '');

            const list = document.getElementById('memberList');
            list.innerHTML = '';
            members.forEach((avatar, username) => {
                const tag = document.createElement('span');
                tag.className = 'member-tag';
                tag.innerHTML =
                    `<img class="avatar avatar-sm" src="${getAvatarUrl(username, avatar)}" /> ${escapeHtml(username)} <span class="online-dot"></span>`;
                tag.title = '双击私聊 ' + username;
                tag.ondblclick = () => { if (username !== currentUser.username) openPrivateChat(username); };
                list.appendChild(tag);
            });
        }

        // ============================================================
        // 个人资料
        // ============================================================
        async function showProfile(username) {
            const { data } = await db.from('users').select('avatar, signature, is_banned, last_login_at, last_device')
                .eq('username', username).single();
            if (data) {
                const isBanned = data.is_banned || false;
                // 获取用户最近消息
                const { data: recentMsgs } = await db.from('messages')
                    .select('content, created_at')
                    .eq('username', username)
                    .order('created_at', { ascending: false })
                    .limit(5);
                let recentHtml = '';
                if (recentMsgs && recentMsgs.length > 0) {
                    recentHtml = recentMsgs.map(m =>
                        `<div style="font-size:0.8rem;color:var(--text-secondary);padding:2px 0;">${escapeHtml(m.content).substring(0,40)} <span style="font-size:0.6rem;color:var(--text-muted);">${formatTime(m.created_at)}</span></div>`
                        ).join('');
                }
                document.getElementById('profileContent').querySelector('.modal-body').innerHTML = `
                    <div class="text-center">
                      <img src="${getAvatarUrl(username, data.avatar)}" class="avatar avatar-lg" style="margin:0 auto 12px;display:block;" />
                      <h3>${escapeHtml(username)} ${isBanned ? '<span style="background:#e74c3c;color:#fff;font-size:0.6rem;padding:2px 8px;border-radius:999px;margin-left:6px;">已封禁</span>' : ''}</h3>
                      <p class="text-secondary">${escapeHtml(data.signature || '这个人很懒，什么都没写～')}</p>
                      <div style="font-size:0.8rem;color:var(--text-muted);margin-top:8px;">
                        <div>📱 最后登录: ${data.last_login_at ? formatFullTime(data.last_login_at) : '未知'}</div>
                        <div>📟 设备: ${escapeHtml(data.last_device || '未知')}</div>
                      </div>
                      ${recentHtml ? `<div style="margin-top:12px;text-align:left;"><strong style="font-size:0.8rem;color:var(--text-secondary);">最近消息:</strong>${recentHtml}</div>` : ''}
                      <button class="btn btn-secondary" onclick="closeModal('profileModal')" style="margin-top:16px;">关闭</button>
                    </div>`;
                openModal('profileModal');
            }
        }

        // ============================================================
        // 私聊（保持不变）
        // ============================================================
        function openPrivateChat(target) {
            if (target === currentUser.username) return;
            privateTarget = target;
            wsChannels = wsChannels.filter(ch => {
                if (ch.topic && ch.topic.includes('private_messages')) { try { db.removeChannel(ch) } catch (_) {}
                    return false; }
                return true;
            });
            document.getElementById('privateChatTitle').textContent = '💬 私聊 · ' + target;
            document.getElementById('privateChatMessages').innerHTML = '';
            loadPrivateMessages(target);
            subscribePrivateMessages();
            openModal('privateChatModal');
            setTimeout(() => document.getElementById('privateChatInput').focus(), 300);
        }

        async function loadPrivateMessages(target) {
            const { data } = await db.from('private_messages').select('*').or(
                `sender.eq.${currentUser.username},receiver.eq.${currentUser.username}`).order('created_at', { ascending: true });
            if (data) {
                const box = document.getElementById('privateChatMessages');
                box.innerHTML = '';
                data.filter(m => (m.sender === currentUser.username && m.receiver === target) || (m.sender === target && m
                    .receiver === currentUser.username)).forEach(m => appendPrivateMessage(m, m.sender === currentUser
                    .username));
                box.scrollTop = box.scrollHeight;
            }
        }

        function subscribePrivateMessages() {
            const ch = db.channel('public:private_messages').on('postgres_changes', { event: 'INSERT', schema: 'public',
                table: 'private_messages' }, payload => {
                const msg = payload.new;
                if ((msg.sender === currentUser.username && msg.receiver === privateTarget) || (msg.sender ===
                        privateTarget && msg.receiver === currentUser.username)) {
                    appendPrivateMessage(msg, msg.sender === currentUser.username);
                    const box = document.getElementById('privateChatMessages');
                    if (box) box.scrollTop = box.scrollHeight;
                    if (msg.sender !== currentUser.username) playSound();
                }
            }).subscribe();
            wsChannels.push(ch);
        }

        async function sendPrivateMessage() {
            const input = document.getElementById('privateChatInput');
            const text = input.value.trim();
            if (!text || !privateTarget) return;
            if (containsBlockedText(text)) { alert('⚠️ 消息包含违规内容，无法发送。'); return; }
            try {
                await db.from('private_messages').insert({ sender: currentUser.username, receiver: privateTarget,
                    content: text });
                input.value = '';
                input.focus();
            } catch (err) { alert('私聊发送失败：' + err.message); }
        }

        function appendPrivateMessage(msg, isSelf) {
            const box = document.getElementById('privateChatMessages');
            if (!box) return;
            const div = document.createElement('div');
            div.className = 'msg ' + (isSelf ? 'self' : 'other');
            div.style.maxWidth = '85%';
            const timeStr = msg.created_at ? formatTime(msg.created_at) : '';
            div.innerHTML = `
                <img class="avatar avatar-sm" src="${getAvatarUrl(msg.sender, '')}" />
                <div class="msg-content">
                  ${!isSelf ? `<div class="msg-username">${escapeHtml(msg.sender)}</div>` : ''}
                  <div class="msg-text">${escapeHtml(msg.content)}</div>
                  <div class="msg-time">${timeStr}</div>
                </div>`;
            box.appendChild(div);
        }

        // ============================================================
        // 表情面板
        // ============================================================
        function toggleEmojiPanel() {
            const panel = document.getElementById('emojiPanel');
            if (panel.style.display === 'block') { panel.style.display = 'none'; } else {
                panel.style.display = 'block';
                document.getElementById('emojiGrid').innerHTML = emojis.map(e =>
                    `<span onclick="insertEmoji('${e}')">${e}</span>`).join('');
            }
        }

        function insertEmoji(emoji) {
            const privateModal = document.getElementById('privateChatModal');
            const isPrivateOpen = privateModal.classList.contains('active') && privateModal.style.display !== 'none';
            if (isPrivateOpen) {
                const privateInput = document.getElementById('privateChatInput');
                privateInput.value += emoji;
                privateInput.focus();
            } else {
                const mainInput = document.getElementById('messageInput');
                mainInput.value += emoji;
                mainInput.focus();
            }
        }

        // ============================================================
        // 视频通话（保持不变）
        // ============================================================
        async function startCall() {
            const target = prompt('📞 输入对方用户名：');
            if (!target || target === currentUser.username) return;
            callTarget = target;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('videoCallModal').classList.add('active');
                document.getElementById('videoCallModal').style.display = 'flex';
                pc = new RTCPeerConnection();
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                pc.ontrack = (e) => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
                pc.onicecandidate = (e) => { if (e.candidate) db.from('calls').insert({ sender: currentUser.username,
                        receiver: target, type: 'ice', data: e.candidate }); };
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                db.from('calls').insert({ sender: currentUser.username, receiver: target, type: 'offer', data: offer });
            } catch (_) { alert('无法访问摄像头/麦克风，请检查权限设置。'); }
        }

        function subscribeCalls() {
            const ch = db.channel('public:calls').on('postgres_changes', { event: 'INSERT', schema: 'public',
                table: 'calls' }, async payload => {
                const msg = payload.new;
                if (msg.receiver !== currentUser.username) return;
                try {
                    if (msg.type === 'offer') {
                        pc = new RTCPeerConnection();
                        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                        document.getElementById('localVideo').srcObject = localStream;
                        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                        pc.ontrack = (e) => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
                        pc.onicecandidate = (e) => { if (e.candidate) db.from('calls').insert({ sender: currentUser
                                .username, receiver: msg.sender, type: 'ice', data: e.candidate }); };
                        await pc.setRemoteDescription(new RTCSessionDescription(msg.data));
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        db.from('calls').insert({ sender: currentUser.username, receiver: msg.sender, type: 'answer',
                            data: answer });
                        document.getElementById('videoCallModal').classList.add('active');
                        document.getElementById('videoCallModal').style.display = 'flex';
                        callTarget = msg.sender;
                    } else if (msg.type === 'answer') { if (pc) await pc.setRemoteDescription(new RTCSessionDescription(
                            msg.data)); } else if (msg.type === 'ice') { if (pc) await pc.addIceCandidate(
                        new RTCIceCandidate(msg.data)); } else if (msg.type === 'hangup') { alert(msg.sender +
                        ' 已挂断通话');
                        hangUp(); }
                } catch (e) { console.warn('Call error:', e); }
            }).subscribe();
            wsChannels.push(ch);
        }

        function hangUp() {
            if (callTarget) db.from('calls').insert({ sender: currentUser.username, receiver: callTarget, type: 'hangup',
                data: {} });
            if (pc) { pc.close();
                pc = null; }
            if (localStream) { localStream.getTracks().forEach(t => t.stop());
                localStream = null; }
            const remoteVideo = document.getElementById('remoteVideo');
            const localVideo = document.getElementById('localVideo');
            if (remoteVideo) remoteVideo.srcObject = null;
            if (localVideo) localVideo.srcObject = null;
            document.getElementById('videoCallModal').classList.remove('active');
            document.getElementById('videoCallModal').style.display = 'none';
            callTarget = '';
        }

        // ============================================================
        // 主题 / 声音
        // ============================================================
        function toggleTheme() { document.body.classList.toggle('light'); }

        function toggleSound() { soundEnabled = !soundEnabled;
            document.getElementById('soundToggle').textContent = soundEnabled ? '🔔' : '🔕'; }

        // ============================================================
        // 键盘事件
        // ============================================================
        document.getElementById('messageInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e
                .preventDefault();
            sendMessage(); } });
        document.getElementById('privateChatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e
                .preventDefault();
            sendPrivateMessage(); } });
        document.querySelectorAll('.modal-overlay').forEach(overlay => { overlay.addEventListener('click', (e) => { if (e
                .target === overlay) { overlay.classList.remove('active');
                overlay.style.display = 'none'; } }); });

        window.onload = () => { autoLogin(); };
    </script>
</body>
